              <svg width="16" height="16" fill="${m.color}" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </div>
            <div class="thumb-play"><svg width="14" height="14" fill="#fff" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
            <span class="absolute bottom-0.5 right-0.5 bg-black/60 text-white text-xs leading-none px-1 py-0.5 rounded" style="font-size:10px">${m.dur}</span>
          </div>
          <div class="min-w-0">
            <p class="text-sm text-gray-900 truncate max-w-xs hover:text-blue-600 cursor-pointer" style="max-width:180px" onclick="openDrawer('${m.id}')">${m.name}</p>
            <p class="text-xs text-gray-400 mt-0.5">${m.id}</p>
          </div>
        </div>
      </td>
      <td class="px-3 py-2.5"><span class="text-xs px-2 py-0.5 rounded ${typeMap[m.type]}">${m.type}</span></td>
      <td class="px-3 py-2.5">${m.cat}</td>
      <td class="px-3 py-2.5">${m.prod}</td>
      <td class="px-3 py-2.5">${m.source}</td>
      <td class="px-3 py-2.5">${m.supplier}</td>
      <td class="px-3 py-2.5">${m.cp}</td>
      <td class="px-3 py-2.5">${m.platform}</td>
      <td class="px-3 py-2.5">
        <span class="status-tag ${s.cls}">
          <span class="w-1.5 h-1.5 rounded-full ${s.dot} mr-1.5 inline-block"></span>${s.label}
        </span>
      </td>
      <td class="px-3 py-2.5 text-right font-medium ${nd ? 'text-gray-300' : 'text-gray-700'}">${nd ? '--' : m.matCount}</td>
      <td class="px-3 py-2.5 text-right font-medium ${nd ? 'text-gray-300' : 'text-gray-700'}">${nd ? '--' : m.planCount}</td>
      <td class="px-3 py-2.5 text-right font-medium ${nd ? 'text-gray-300' : 'text-gray-800'}">${fmtMoney(m.cost)}</td>
      <td class="px-3 py-2.5 text-right ${nd ? 'text-gray-300' : 'text-gray-700'}">${fmt(m.newUser)}</td>
      <td class="px-3 py-2.5 text-right font-medium ${nd ? 'text-gray-300' : m.clickRate >= 4 ? 'text-green-600' : m.clickRate >= 3 ? 'text-gray-700' : 'text-red-500'}">${fmtP(m.clickRate)}</td>
      <td class="px-3 py-2.5 text-right font-medium ${nd ? 'text-gray-300' : m.cvr >= 3 ? 'text-green-600' : m.cvr >= 2 ? 'text-gray-700' : 'text-red-500'}">${fmtP(m.cvr)}</td>
      <td class="px-3 py-2.5 text-right font-medium ${nd ? 'text-gray-300' : m.threeS >= 60 ? 'text-green-600' : m.threeS >= 45 ? 'text-gray-700' : 'text-red-500'}">${fmtP(m.threeS)}</td>
      <td class="px-3 py-2.5 text-right ${nd ? 'text-gray-300' : 'text-gray-700'}">${fmtP(m.fifty)}</td>
      <td class="px-3 py-2.5 text-right ${nd ? 'text-gray-300' : 'text-gray-700'}">${fmtP(m.seventy5)}</td>
      <td class="px-3 py-2.5 text-center sticky right-0 bg-white" style="box-shadow:-2px 0 4px rgba(0,0,0,0.03);" onclick="event.stopPropagation()">
        <div class="relative inline-block">
          <button class="p-1 rounded hover:bg-gray-100 text-gray-400 hover:text-gray-600" onclick="toggleMenu(this)">
            <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>
          </button>
          <div class="action-menu hidden absolute right-0 top-full mt-1 bg-white rounded shadow-lg border border-gray-200 py-1 z-20 w-28">
            <button class="w-full text-left px-3 py-1.5 text-xs text-gray-600 hover:bg-gray-50" onclick="openDrawer('${m.id}')">查看详情</button>
            <button class="w-full text-left px-3 py-1.5 text-xs text-gray-600 hover:bg-gray-50">编辑属性</button>
            <div class="border-t border-gray-100 my-0.5"></div>
            <button class="w-full text-left px-3 py-1.5 text-xs text-amber-600 hover:bg-amber-50">移至待优化库</button>
            <button class="w-full text-left px-3 py-1.5 text-xs text-red-500 hover:bg-red-50">移至回收站</button>
          </div>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function toggleMenu(btn) {
  const menu = btn.nextElementSibling;
  document.querySelectorAll('.action-menu').forEach(m => { if(m!==menu) m.classList.add('hidden'); });
  menu.classList.toggle('hidden');
}
document.addEventListener('click', e => {
  if (!e.target.closest('.action-menu') && !e.target.closest('[onclick*="toggleMenu"]'))
    document.querySelectorAll('.action-menu').forEach(m => m.classList.add('hidden'));
});

function toggleAll(el) {
  document.querySelectorAll('.row-check').forEach(cb => { cb.checked = el.checked; toggleCheck(cb); });
}
function toggleCheck(cb) {
  const id = cb.dataset.id;
  if(cb.checked) selectedIds.add(id); else selectedIds.delete(id);
  updateBatch();
}
function updateBatch() {
  const bar = document.getElementById('batchBar');
  if(selectedIds.size > 0) { bar.classList.remove('hidden'); bar.classList.add('flex'); document.getElementById('selectedCount').textContent = `已选 ${selectedIds.size} 项`; }
  else { bar.classList.add('hidden'); bar.classList.remove('flex'); }
}
function clearSelection() {
  selectedIds.clear(); document.querySelectorAll('.row-check').forEach(cb=>cb.checked=false);
  document.getElementById('selectAll').checked = false; updateBatch();
}

function switchLib(btn) {
  document.querySelectorAll('.lib-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const names = { formal:'正式库', optimize:'待优化库', trash:'回收站' };
  document.getElementById('libLabel').textContent = names[btn.dataset.lib];
}

function openVideoModal(dur) {
  document.getElementById('modalDuration').textContent = dur;
  document.getElementById('videoModal').classList.remove('hidden');
}
function closeVideoModal() { document.getElementById('videoModal').classList.add('hidden'); }

function openDrawer(id) {
  const m = materials.find(x => x.id === id);
  if(!m) return;
  const s = statusMap[m.status];
  const nd = m.status === 'none';
  document.getElementById('drawerTitle').textContent = m.name;
  document.getElementById('drawerContent').innerHTML = `
    <div class="space-y-5">
      <div class="rounded-lg overflow-hidden bg-gradient-to-br from-gray-800 to-gray-900 aspect-video flex items-center justify-center relative cursor-pointer" onclick="openVideoModal('${m.dur}')">
        <div class="text-center"><div class="w-14 h-14 rounded-full flex items-center justify-center mx-auto mb-2" style="background:${m.color}33"><svg width="24" height="24" fill="${m.color}" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div><span class="text-white/40 text-xs">点击播放</span></div>
        <span class="absolute bottom-2 right-2 bg-black/60 text-white text-xs px-1.5 py-0.5 rounded">${m.dur}</span>
      </div>
      <div>
        <h3 class="text-xs font-semibold text-gray-900 mb-2">基础信息</h3>
        <div class="grid grid-cols-3 gap-2 text-xs">
          ${[['素材ID',m.id],['类型',m.type],['品类',m.cat],['产品',m.prod],['来源',m.source],['供应商',m.supplier],['CP名称',m.cp],['推广平台',m.platform]].map(([l,v])=>`<div class="bg-gray-50 rounded p-2.5"><span class="text-gray-400 block mb-0.5">${l}</span><span class="text-gray-800 font-medium">${v}</span></div>`).join('')}
        </div>
      </div>
      <div>
        <h3 class="text-xs font-semibold text-gray-900 mb-2">投放信息</h3>
        <div class="bg-gray-50 rounded p-3 space-y-2 text-xs">
          <div class="flex justify-between"><span class="text-gray-500">投放状态</span><span class="status-tag ${s.cls}"><span class="w-1.5 h-1.5 rounded-full ${s.dot} mr-1 inline-block"></span>${s.label}</span></div>
          ${!nd ? `<div class="flex justify-between"><span class="text-gray-500">在投素材数</span><span class="text-gray-800 font-medium">${m.matCount}</span></div><div class="flex justify-between"><span class="text-gray-500">在投计划数</span><span class="text-blue-600 font-medium">${m.planCount}</span></div>` : '<div class="text-gray-400">暂无投放记录</div>'}
        </div>
      </div>
      <div>
        <h3 class="text-xs font-semibold text-gray-900 mb-2">效果数据</h3>
        ${nd ? '<p class="text-xs text-gray-400 bg-gray-50 rounded p-3">暂无数据</p>' : `
        <div class="grid grid-cols-2 gap-2">
          ${[['媒体消耗',fmtMoney(m.cost)],['新增人数',fmt(m.newUser)],['封面点击率',fmtP(m.clickRate)],['媒体转化率',fmtP(m.cvr)],['3S播放率',fmtP(m.threeS)],['50%播放率',fmtP(m.fifty)],['75%播放率',fmtP(m.seventy5)]].map(([l,v])=>`<div class="border border-gray-200 rounded p-3 text-center"><span class="text-xs text-gray-400 block mb-1">${l}</span><span class="text-sm font-semibold text-gray-900">${v}</span></div>`).join('')}
        </div>`}
      </div>
      <div class="flex gap-2 pt-1">
        <button class="flex-1 py-2 rounded text-xs font-medium bg-amber-50 text-amber-600 hover:bg-amber-100">移至待优化库</button>
        <button class="flex-1 py-2 rounded text-xs font-medium bg-red-50 text-red-500 hover:bg-red-100">移至回收站</button>
      </div>
    </div>`;
  const mask = document.getElementById('drawerMask');
  const panel = document.getElementById('drawerPanel');
  mask.classList.remove('hidden');
  requestAnimationFrame(()=>{ mask.style.opacity='1'; panel.style.transform='translateX(0)'; });
}

function closeDrawer() {
  const mask = document.getElementById('drawerMask');
  const panel = document.getElementById('drawerPanel');
  mask.style.opacity='0'; panel.style.transform='translateX(100%)';
  setTimeout(()=>mask.classList.add('hidden'), 250);
}

function doSort(field, dir) {
  // Sort indicator feedback
  document.querySelectorAll('.sort-icon span').forEach(s=>s.classList.remove('active'));
  event.target.classList.add('active');
}

function resetFilters() {
  document.querySelectorAll('select').forEach(s => s.selectedIndex = 0);
  document.querySelectorAll('input[type="text"], input[type="number"]').forEach(i => i.value = '');
}

renderTable();
</script>
<script>window.parent.postMessage({ action: "ready" }, "*"); 
 
window.console = new Proxy(console, {
  get(target, prop) {
    if (['log', 'warn', 'error'].includes(prop)) {
      return new Proxy(target[prop], {
        apply(fn, thisArg, args) {
          fn.apply(thisArg, args);
          window.parent.postMessage({ action: 'console', 
            type: prop, 
            args: args.map((arg) => {
              try {
                return JSON.stringify(arg).replace(/^["']|["']$/g, '');
              } catch (e) {
                return arg;
              }
            }) 
          }, '*');
        }
      });
    }
    return target[prop];
  }
});
</script></body>
</html>
