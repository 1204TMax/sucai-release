<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>品类管理 - 量化投放系统</title>
    <style>
        /* [Ant Design 字体规范 spec/font.zh-CN.md] 系统默认字体族 + 14px主字体 + 1.5714行高 */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                         'Helvetica Neue', Arial, 'Noto Sans', 'PingFang SC',
                         'Microsoft YaHei', sans-serif;
            font-size: 14px;
            line-height: 1.5714;
            color: rgba(0,0,0,0.88);
            background-color: #f5f7fa;
            padding: 20px;
        }

        /* [Ant Design 色彩规范 spec/colors.zh-CN.md] 品牌色 #1677ff + 中性色板 */
        :root {
            --primary:        #1677ff;
            --primary-hover:  #4096ff;
            --primary-active: #0958d9;
            --primary-bg:     #e6f4ff;
            --primary-border: #91caff;
            --text-primary:   rgba(0,0,0,0.88);
            --text-secondary: rgba(0,0,0,0.45);
            --text-label:     rgba(0,0,0,0.65);
            --border:         #d9d9d9;
            --border-light:   #f0f0f0;
            --bg-card:        #ffffff;
            --bg-layout:      #f5f7fa;
            --success:        #52c41a;
            --danger:         #ff4d4f;
        }

        /* [Ant Design 布局规范 spec/layout.zh-CN.md] 8px 基准网格，左右双栏布局 */
        .page-layout {
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }

        /* ======================================================
           左侧：品类列表
           [Ant Design 数据列表规范 spec/data-list.zh-CN.md]
           列表兼顾浏览性与展示性，适合快速扫读
        ====================================================== */
        .left-panel {
            width: 232px;
            flex-shrink: 0;
            background: var(--bg-card);
            border-radius: 8px;
            border: 1px solid var(--border-light);
            overflow: hidden;
        }

        .left-panel-header {
            padding: 16px 16px 12px;
            border-bottom: 1px solid var(--border-light);
        }

        .left-panel-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        /* [Ant Design 数据录入规范 spec/data-entry.zh-CN.md] 搜索框带暗提示 */
        .search-box {
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 9px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            height: 32px;
            padding: 4px 11px 4px 30px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            color: var(--text-primary);
            background: #fff;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(22,119,255,0.1);
        }

        .search-input::placeholder { color: var(--text-secondary); }

        .cat-count {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .category-list { overflow: visible; }

        .category-item {
            padding: 10px 16px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: background 0.15s, border-color 0.15s;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .category-item:hover { background: #fafafa; }

        .category-item.active {
            background: var(--primary-bg);
            border-left-color: var(--primary);
        }

        .category-item.active .cat-name {
            color: var(--primary);
            font-weight: 500;
        }

        .cat-meta {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .cat-name {
            font-size: 14px;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cat-id {
            font-size: 12px;
            color: var(--text-secondary);
            font-variant-numeric: tabular-nums;
        }

        .cat-arrow {
            color: var(--text-secondary);
            opacity: 0;
            transition: opacity 0.15s;
            flex-shrink: 0;
        }

        .category-item:hover .cat-arrow,
        .category-item.active .cat-arrow {
            opacity: 1;
            color: var(--primary);
        }

        /* 品类数量 badge */
        .prod-badge {
            font-size: 11px;
            color: var(--text-secondary);
            background: var(--bg-layout);
            padding: 1px 6px;
            border-radius: 8px;
            flex-shrink: 0;
            line-height: 18px;
        }

        .category-item.active .prod-badge {
            background: var(--primary-border);
            color: var(--primary);
        }

        /* 空状态 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 36px;
            margin-bottom: 12px;
            opacity: 0.4;
        }

        .empty-text { font-size: 13px; }

        /* ======================================================
           右侧：品类详情
        ====================================================== */
        .right-panel {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* [Ant Design 数据展示规范 spec/data-display.zh-CN.md] 卡片容器 */
        .detail-card {
            background: var(--bg-card);
            border-radius: 8px;
            border: 1px solid var(--border-light);
            padding: 24px;
        }

        .card-title {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-title-hint {
            font-size: 12px;
            font-weight: 400;
            color: var(--text-secondary);
        }

        /* 只读信息组（品类ID、名称）— 描述列表模式 */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .info-item { display: flex; flex-direction: column; gap: 4px; }

        .info-label {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .info-value {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
        }

        /* ======================================================
           可编辑字段
           [Ant Design 数据录入规范 spec/data-entry.zh-CN.md]
           长篇幅文本使用 Textarea
        ====================================================== */
        .field-group { margin-bottom: 20px; }
        .field-group:last-of-type { margin-bottom: 0; }

        .field-label {
            font-size: 14px;
            color: var(--text-label);
            margin-bottom: 6px;
        }

        .field-textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            line-height: 1.5714;
            color: var(--text-primary);
            background: #fff;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            display: block;
        }

        .field-textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(22,119,255,0.1);
        }

        .field-textarea::placeholder { color: var(--text-secondary); }

        .char-count {
            font-size: 12px;
            color: var(--text-secondary);
            text-align: right;
            margin-top: 4px;
        }

        /* [Ant Design 按钮规范 spec/buttons.zh-CN.md]
           主要操作使用 Primary Button，一个按钮区最多一个主按钮
           推荐操作在左（靠近用户阅读路径结尾）*/
        .actions-bar {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            padding-top: 16px;
            border-top: 1px solid var(--border-light);
            margin-top: 4px;
        }

        .btn {
            height: 32px;
            padding: 0 16px;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            font-weight: 400;
            cursor: pointer;
            border: 1px solid transparent;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            line-height: 1;
        }

        .btn-default {
            background: #fff;
            border-color: var(--border);
            color: var(--text-primary);
        }

        .btn-default:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-primary {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            border-color: var(--primary-hover);
        }

        .btn-primary:active {
            background: var(--primary-active);
            border-color: var(--primary-active);
        }

        /* ======================================================
           产品清单
           [Ant Design 数据展示规范 spec/data-display.zh-CN.md]
           卡片列表：网格布局，每个对象拥有平等展示机会
           建议一行最多不超过四个
        ====================================================== */
        .section-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border-light);
        }

        .section-title {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .count-badge {
            background: var(--primary-bg);
            color: var(--primary);
            font-size: 12px;
            padding: 0 8px;
            height: 20px;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
        }

        .readonly-tip {
            margin-left: auto;
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .products-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        /* [Ant Design 即时反馈规范 spec/reaction.zh-CN.md]
           交互之前给出邀请反馈（hover），交互之后立即响应（click） */
        .product-card {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            background: #fff;
            border: 1px solid var(--border-light);
            border-radius: 8px;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s, transform 0.15s;
            flex: 0 0 calc(25% - 9px);
            min-width: 130px;
        }

        .product-card:hover {
            border-color: var(--primary);
            background: var(--primary-bg);
            box-shadow: 0 2px 8px rgba(22,119,255,0.12);
            transform: translateY(-1px);
        }

        .product-card:active {
            transform: translateY(0);
            box-shadow: none;
        }

        .product-logo {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 14px;
            font-weight: 600;
            color: rgba(0,0,0,0.55);
        }

        .product-name {
            font-size: 13px;
            color: var(--text-primary);
            line-height: 1.4;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .product-card:hover .product-name { color: var(--primary); }

        /* ======================================================
           内联保存反馈（不使用 position:fixed 以遵守 iframe 规范）
        ====================================================== */
        .save-feedback {
            display: none;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--success);
            padding: 0 4px;
        }

        .save-feedback.show { display: inline-flex; }

        /* 初始占位 */
        .placeholder-card {
            background: var(--bg-card);
            border-radius: 8px;
            border: 1px solid var(--border-light);
            padding: 48px 24px;
        }

        /* 响应式：小屏缩为两列 */
        @media (max-width: 960px) {
            .product-card { flex: 0 0 calc(50% - 6px); }
        }
    </style>
</head>
<body>

<div class="page-layout">

    <!-- ========== 左侧品类列表 ========== -->
    <div class="left-panel">
        <div class="left-panel-header">
            <div class="left-panel-title">品类列表</div>
            <div class="search-box">
                <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input class="search-input" id="searchInput"
                       placeholder="搜索品类名称"
                       oninput="filterCategories(this.value)">
            </div>
            <div class="cat-count" id="catCount"></div>
        </div>
        <div class="category-list" id="categoryList"></div>
    </div>

    <!-- ========== 右侧详情区 ========== -->
    <div class="right-panel" id="rightPanel">
        <div class="placeholder-card">
            <div class="empty-state">
                <div class="empty-icon">☰</div>
                <div class="empty-text">请从左侧选择一个品类查看详情</div>
            </div>
        </div>
    </div>

</div>

<script>
// ============================================================
// Mock 数据
// ============================================================
const CATEGORIES = [
    {
        id: 'CAT001',
        name: '美妆个护',
        portrait: '追求精致生活的都市女性，年龄 25-35 岁，注重品质和颜值，消费能力中等偏上，活跃于小红书、抖音等平台，对新品牌接受度高，购买决策受 KOL 影响较大。',
        description: '包含护肤、彩妆、香水、个人护理等产品线，重点关注成分安全性和包装设计，主力价格带 150-500 元。',
        products: [
            { id: 'P001', name: '臻颜修护面霜',   color: '#ffd6e0' },
            { id: 'P002', name: '水感精华液',      color: '#a8d8ea' },
            { id: 'P003', name: '防晒隔离乳',      color: '#ffe0b2' },
            { id: 'P004', name: '玫瑰香水',        color: '#f8bbd0' },
            { id: 'P005', name: '气垫粉底',        color: '#fce4ec' },
            { id: 'P006', name: '口红套装',        color: '#ff8fa3' },
            { id: 'P007', name: '眼影盘',          color: '#d1c4e9' },
            { id: 'P008', name: '洁面泡沫',        color: '#b2ebf2' },
        ]
    },
    {
        id: 'CAT002',
        name: '食品饮料',
        portrait: '关注健康饮食的城市中产人群，年龄 20-45 岁，追求营养均衡和口味新奇，愿意为品质付费，常通过电商平台和社区团购购买，复购率高。',
        description: '涵盖零食、饮品、健康食品、调味料等品类，消费者注重成分表和营养标签，有机/低糖/高蛋白产品增长较快。',
        products: [
            { id: 'P011', name: '燕麦代餐饼干',   color: '#fff9c4' },
            { id: 'P012', name: '冷压果蔬汁',     color: '#c8e6c9' },
            { id: 'P013', name: '低糖气泡水',     color: '#b3e5fc' },
            { id: 'P014', name: '坚果混合装',     color: '#d7ccc8' },
            { id: 'P015', name: '即食麦片',       color: '#ffe0b2' },
        ]
    },
    {
        id: 'CAT003',
        name: '家居用品',
        portrait: '新婚或新居入住的 25-40 岁人群，注重生活品质和家居美学，偏好简约北欧或日系风格，通过网红推荐和线下体验店了解产品，客单价较高。',
        description: '包含床品、收纳、装饰、厨具等品类，注重颜值与实用性的平衡，用户常在小红书搜索家居灵感，场景化内容营销效果好。',
        products: [
            { id: 'P021', name: '日式收纳盒套装', color: '#e0e0e0' },
            { id: 'P022', name: '北欧风装饰画',   color: '#c8e6c9' },
            { id: 'P023', name: '竹纤维床品套件', color: '#f5f5dc' },
            { id: 'P024', name: '硅藻土地垫',     color: '#e1d5e7' },
        ]
    },
    {
        id: 'CAT004',
        name: '运动户外',
        portrait: '追求健康生活方式的 18-40 岁人群，有规律运动习惯，关注产品专业性和耐用性，通过体育垂媒和运动 KOL 了解产品，品牌忠诚度较高。',
        description: '覆盖跑步、健身、户外探险等场景，用户对功能性要求高，愿意为专业品牌溢价付费，内容营销以专业测评和运动打卡为主。',
        products: [
            { id: 'P031', name: '碳纤维跑鞋',     color: '#bbdefb' },
            { id: 'P032', name: '瑜伽垫专业版',   color: '#c8f7c5' },
            { id: 'P033', name: '无缝运动内衣',   color: '#ffcdd2' },
            { id: 'P034', name: '登山背包 40L',   color: '#dcedc8' },
            { id: 'P035', name: '智能跳绳',       color: '#fff9c4' },
            { id: 'P036', name: '运动护膝',       color: '#e1bee7' },
        ]
    },
    {
        id: 'CAT005',
        name: '数码配件',
        portrait: '科技爱好者和数码潮人，年龄 18-35 岁，追求颜值和功能兼备，对价格敏感但愿意为口碑品牌付费，通过 B 站、微博等平台了解新品，决策周期短。',
        description: '包含手机壳、充电设备、耳机、摄影配件等，用户决策快，开箱和测评视频影响力大，SKU 多样化需要差异化内容策略。',
        products: [
            { id: 'P041', name: '磁吸手机支架',   color: '#90caf9' },
            { id: 'P042', name: '氮化镓充电器',   color: '#ffcc80' },
            { id: 'P043', name: '无线降噪耳机',   color: '#a5d6a7' },
            { id: 'P044', name: '手机摄影滤镜组', color: '#ce93d8' },
        ]
    }
];

let currentCatId = null;
let filtered = [...CATEGORIES];

// ---- 渲染品类列表 ----
function renderList(cats) {
    const list = document.getElementById('categoryList');
    const count = document.getElementById('catCount');
    count.textContent = `共 ${cats.length} 个品类`;

    if (cats.length === 0) {
        list.innerHTML = `<div class="empty-state" style="padding:24px 16px;">
            <div class="empty-icon" style="font-size:28px;">🔍</div>
            <div class="empty-text">未找到匹配品类</div>
        </div>`;
        return;
    }

    list.innerHTML = cats.map(cat => `
        <div class="category-item ${cat.id === currentCatId ? 'active' : ''}"
             onclick="selectCat('${cat.id}')" data-id="${cat.id}">
            <div class="cat-meta">
                <span class="cat-name">${cat.name}</span>
                <span class="cat-id">${cat.id}</span>
            </div>
            <span class="prod-badge">${cat.products.length}</span>
            <svg class="cat-arrow" width="12" height="12" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <polyline points="9 18 15 12 9 6"/>
            </svg>
        </div>
    `).join('');
}

// ---- 实时筛选品类名称 ----
function filterCategories(kw) {
    const k = kw.trim().toLowerCase();
    filtered = k ? CATEGORIES.filter(c => c.name.toLowerCase().includes(k)) : [...CATEGORIES];
    renderList(filtered);
}

// ---- 选中品类 ----
function selectCat(id) {
    currentCatId = id;
    const cat = CATEGORIES.find(c => c.id === id);
    if (!cat) return;
    renderList(filtered);
    renderDetail(cat);
}

// ---- 渲染详情面板 ----
function renderDetail(cat) {
    const panel = document.getElementById('rightPanel');
    panel.innerHTML = `

        <!-- 品类基本信息（只读） -->
        <div class="detail-card">
            <div class="card-title">
                品类信息
                <span class="card-title-hint">以下字段不可修改</span>
            </div>
            <div class="info-grid">
                <div class="info-item">
                    <span class="info-label">品类 ID</span>
                    <span class="info-value">${cat.id}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">品类名称</span>
                    <span class="info-value">${cat.name}</span>
                </div>
            </div>
        </div>

        <!-- 可编辑信息 -->
        <div class="detail-card">
            <div class="card-title">编辑信息</div>

            <div class="field-group">
                <div class="field-label">用户画像</div>
                <!-- [Ant Design 数据录入] 长篇幅文本使用 Textarea -->
                <textarea class="field-textarea" id="portraitInput"
                          rows="4"
                          placeholder="请输入用户画像描述..."
                          oninput="syncCount('portraitInput','portraitCount',500)">${escHtml(cat.portrait)}</textarea>
                <div class="char-count">
                    <span id="portraitCount">${cat.portrait.length}</span> / 500
                </div>
            </div>

            <div class="field-group">
                <div class="field-label">其他描述</div>
                <textarea class="field-textarea" id="descInput"
                          rows="3"
                          placeholder="请输入品类描述..."
                          oninput="syncCount('descInput','descCount',300)">${escHtml(cat.description)}</textarea>
                <div class="char-count">
                    <span id="descCount">${cat.description.length}</span> / 300
                </div>
            </div>

            <!-- [Ant Design 按钮规范] 主按钮突出推进操作；次按钮用于重置（安全操作） -->
            <div class="actions-bar">
                <span class="save-feedback" id="saveFeedback">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2.5" stroke-linecap="round">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                    已保存
                </span>
                <button class="btn btn-default" onclick="resetFields('${cat.id}')">重置</button>
                <button class="btn btn-primary" onclick="saveFields('${cat.id}')">保存</button>
            </div>
        </div>

        <!-- 产品清单（只读） -->
        <div class="detail-card">
            <div class="section-header">
                <span class="section-title">产品清单</span>
                <span class="count-badge">${cat.products.length} 个</span>
                <span class="readonly-tip">点击产品可跳转至产品管理</span>
            </div>

            ${cat.products.length === 0
                ? `<div class="empty-state">
                       <div class="empty-icon">📦</div>
                       <div class="empty-text">该品类暂无关联产品</div>
                   </div>`
                : `<div class="products-grid">
                       ${cat.products.map(p => `
                           <div class="product-card" onclick="openProduct('${escAttr(p.id)}','${escAttr(p.name)}')">
                               <div class="product-logo" style="background:${p.color}">
                                   ${p.name.charAt(0)}
                               </div>
                               <span class="product-name">${escHtml(p.name)}</span>
                           </div>
                       `).join('')}
                   </div>`
            }
        </div>
    `;
}

// ---- 字符计数同步 ----
function syncCount(inputId, countId, max) {
    const el = document.getElementById(inputId);
    const ct = document.getElementById(countId);
    if (!el || !ct) return;
    const len = el.value.length;
    ct.textContent = len;
    ct.style.color = len > max * 0.9 ? 'var(--danger)' : 'var(--text-secondary)';
}

// ---- 重置 ----
function resetFields(id) {
    const cat = CATEGORIES.find(c => c.id === id);
    if (!cat) return;
    document.getElementById('portraitInput').value = cat.portrait;
    document.getElementById('descInput').value = cat.description;
    syncCount('portraitInput', 'portraitCount', 500);
    syncCount('descInput', 'descCount', 300);
    hideFeedback();
}

// ---- 保存（写回 mock 数据） ----
function saveFields(id) {
    const cat = CATEGORIES.find(c => c.id === id);
    if (!cat) return;
    cat.portrait = document.getElementById('portraitInput').value;
    cat.description = document.getElementById('descInput').value;
    showFeedback();
}

// ---- 保存反馈（内联，不用 fixed 定位） ----
function showFeedback() {
    const fb = document.getElementById('saveFeedback');
    if (!fb) return;
    fb.classList.add('show');
    setTimeout(() => fb.classList.remove('show'), 2500);
}

function hideFeedback() {
    const fb = document.getElementById('saveFeedback');
    if (fb) fb.classList.remove('show');
}

// ---- 跳转产品管理页 ----
function openProduct(id, name) {
    parent.postMessage({ action: 'openTab', title: '产品管理', url: '素材管理/product.html' }, '*');
}

// ---- 安全转义 ----
function escHtml(s) {
    return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}

function escAttr(s) {
    return String(s).replace(/'/g, '\\\'');
}

// ---- 初始化 ----
renderList(CATEGORIES);
if (CATEGORIES.length > 0) selectCat(CATEGORIES[0].id);
</script>
</body>
</html>
