                    </div>
                    <div class="ratio-box" style="width:${cw}px;height:${ch}px;"></div>
                    <span class="ratio-lbl">${cr}</span>
                </div>`;
            }).join('');

            const addBtn = customRatios.length < 5
                ? `<div class="custom-add-btn" onclick="showCustomInput(event)">+ 添加自定义比例</div>`
                : '';

            ddInner = `<div class="dd-section">
                <div class="dd-section-title">预设比例</div>
                ${tabBar}
                ${presetContent}
            </div>
            <div class="dd-section">
                <div class="dd-section-title">自定义比例</div>
                ${customRatios.length ? `<div class="ratio-row">${customChips}</div>` : ''}
                ${addBtn}
                <div class="custom-input-row" id="customInputRow" style="display:none;">
                    <input type="number" class="custom-input" id="customW" placeholder="宽"
                           min="1" max="9999" onclick="event.stopPropagation()" onkeydown="onCustomKey(event)">
                    <span class="custom-sep">:</span>
                    <input type="number" class="custom-input" id="customH" placeholder="高"
                           min="1" max="9999" onclick="event.stopPropagation()" onkeydown="onCustomKey(event)">
                    <button class="custom-confirm" onclick="saveCustomRatio(event)">✓</button>
                    <button class="custom-cancel" onclick="cancelCustomInput(event)">✕</button>
                </div>
            </div>
            ${opt.showRes !== false ? `<div class="dd-section">
                <div class="res-toggle">
                    <div class="res-large${res==='1K'?' active':''}" onclick="pickRatioRes(event,'res','1K')">1K</div>
                    <div class="res-large${res==='2K'?' active':''}" onclick="pickRatioRes(event,'res','2K')">高清 2K</div>
                    <div class="res-large${res==='4K'?' active':''}" onclick="pickRatioRes(event,'res','4K')">超清 4K <span class="res-star">✦</span></div>
                </div>
            </div>` : ''}`;

        } else if (opt.type === 'ratio-dur') {
            const ratio = sel[curType].ratio || '16:9';
            const ratioTab = sel[curType].ratioTab || '全部';
            const ps = sel[curType].platformSize;

            // pill 图标
            let rw = 14, rh = 14;
            if (ratioTab !== '全部' && ps) { rw = ps.w; rh = ps.h; }
            else if (RATIO_SIZES[ratio]) { [rw, rh] = RATIO_SIZES[ratio]; }
            const sc = 11 / Math.max(rw, rh);
            const iw = Math.round(rw * sc), ih = Math.round(rh * sc);
            const ratioDisplay = (ratioTab !== '全部' && ps) ? `${ps.w}×${ps.h}` : ratio;
            const dur = sel[curType].dur || '5秒';
            pillVal = `<span class="pill-ratio-box" style="width:${iw}px;height:${ih}px;"></span>${ratioDisplay} · ${dur}`;

            // 平台 tab bar
            const tabBar = `<div class="ratio-platform-tabs">
                ${PLATFORM_TABS.map(t =>
                    `<div class="ratio-platform-tab${t === ratioTab ? ' active' : ''}"
                          onclick="switchRatioTab(event,'${t}')">${t}</div>`
                ).join('')}
            </div>`;

            // 预设比例内容
            let presetContent;
            if (ratioTab === '全部') {
                presetContent = `<div class="ratio-row">
                    ${opt.ratioValues.map(v => {
                        const [w, h] = RATIO_SIZES[v] || [14, 14];
                        return `<div class="ratio-chip${v === ratio ? ' active' : ''}"
                                     onclick="pickRatioRes(event,'ratio','${v}')">
                            <div class="ratio-box" style="width:${w}px;height:${h}px;"></div>
                            <span class="ratio-lbl">${v}</span>
                        </div>`;
                    }).join('')}
                </div>`;
            } else {
                const presets = PLATFORM_PRESETS[ratioTab] || [];
                if (presets.length === 0) {
                    presetContent = `<div class="platform-empty">暂未配置，敬请期待</div>`;
                } else {
                    presetContent = `<div class="ratio-row" style="flex-wrap:nowrap;">
                        ${presets.map(p => {
                            const isActive = ps && ps.w === p.w && ps.h === p.h;
                            const mx = 16;
                            let cw = mx, ch = mx;
                            if (p.w >= p.h) { cw = mx; ch = Math.round(mx * p.h / p.w); }
                            else { ch = mx; cw = Math.round(mx * p.w / p.h); }
                            return `<div class="ratio-chip platform${isActive ? ' active' : ''}"
                                         onclick="pickPlatformPreset(event,${p.w},${p.h},'${p.ratio || ''}')">
                                <div class="platform-chip-icon">
                                    <div class="ratio-box" style="width:${cw}px;height:${ch}px;"></div>
                                </div>
                                <span class="ratio-lbl">${p.w}×${p.h}</span>
                                <span class="ratio-sub">${p.ratio || ''}</span>
                            </div>`;
                        }).join('')}
                    </div>`;
                }
            }

            ddInner = `<div class="dd-section">
                <div class="dd-section-title">比例</div>
                ${tabBar}
                ${presetContent}
            </div>
            <div class="dd-section">
                <div class="dd-section-title">时长</div>
                <div class="dd-chips">
                    ${(opt.durValues || ['5秒','10秒','15秒','30秒']).map(v =>
                        `<span class="dd-chip${v===dur?' active':''}"
                               onclick="pickOpt(event,'dur','${v}')">${v}</span>`
                    ).join('')}
                </div>
            </div>`;

        } else if (opt.type === 'ratio') {
            const val = sel[curType][opt.key] || opt.def;
            const [rw, rh] = RATIO_SIZES[val] || [14, 14];
            const sc = 11 / Math.max(rw, rh);
            const iw = Math.round(rw * sc), ih = Math.round(rh * sc);
            pillVal = `<span class="pill-ratio-box" style="width:${iw}px;height:${ih}px;"></span>${val}`;
            ddInner = `<div class="dd-section">
                <div class="dd-section-title">${opt.label}</div>
                <div class="ratio-row">
                    ${opt.values.map(v => {
                        const [w,h] = RATIO_SIZES[v] || [14,14];
                        return `<div class="ratio-chip${v===val?' active':''}"
                                     onclick="pickOpt(event,'${opt.key}','${v}')">
                            <div class="ratio-box" style="width:${w}px;height:${h}px;"></div>
                            <span class="ratio-lbl">${v}</span>
                        </div>`;
                    }).join('')}
                </div>
            </div>`;

        } else if (opt.type === 'chips') {
            const val = sel[curType][opt.key] || opt.def;
            pillVal = val;
            ddInner = `<div class="dd-section">
                <div class="dd-section-title">${opt.label}</div>
                <div class="dd-chips">
                    ${opt.values.map(v =>
                        `<span class="dd-chip${v===val?' active':''}"
                               onclick="pickOpt(event,'${opt.key}','${v}')">${v}</span>`
                    ).join('')}
                </div>
            </div>`;

        } else if (opt.type === 'res') {
            const val = sel[curType][opt.key] || opt.def;
            pillVal = val;
            ddInner = `<div class="dd-section">
                <div class="dd-section-title">${opt.label}</div>
                <div class="dd-chips">
                    ${opt.values.map(v =>
                        `<span class="dd-chip${v===val?' active':''}"
                               onclick="pickOpt(event,'${opt.key}','${v}')">${v}</span>`
                    ).join('')}
                </div>
            </div>`;

        } else if (opt.type === 'count') {
            const val = sel[curType].count || '1';
            const unit = opt.unit || '张';
            const isCustom = !opt.values.includes(val);
            pillVal = val + ' ' + unit;
            ddInner = `<div class="dd-section">
                <div class="dd-section-title">生成数量</div>
                <div class="dd-chips" style="flex-wrap:nowrap;">
                    ${opt.values.map(v =>
                        `<span class="dd-chip${v===val?' active':''}"
                               onclick="pickOpt(event,'count','${v}')">${v}</span>`
                    ).join('')}
                    <span class="count-custom-wrap">
                        <input class="count-custom-input${isCustom?' active':''}"
                               id="countCustomInput"
                               type="number" min="1" max="99"
                               value="${isCustom ? val : ''}"
                               placeholder="自定义"
                               onclick="event.stopPropagation()"
                               onkeydown="onCountKey(event)">
                        <button class="count-confirm-btn" onclick="confirmCount(event)">确认</button>
                    </span>
                </div>
            </div>`;

        } else if (opt.type === 'project') {
            const val = sel[curType].project || '';
            pillVal = val || '项目';
            ddInner = `<div class="dd-section">
                <div class="dd-section-title">选择目标项目</div>
                ${PROJECTS.map((g, gi) => {
                    const catActive = val === g.category;
                    const hasActiveProd = g.products.includes(val);
                    return `
                    <div class="project-group">
                        <div class="project-cat-row" onclick="toggleProjectGroup(event,${gi})">
                            <div class="project-check${catActive ? ' active' : ''}"
                                 onclick="pickProject(event,'cat','${g.category}')"></div>
                            <span class="project-cat-name">${g.category}</span>
                            <span class="project-expand-arr${_projectOpen.has(gi) ? ' open' : ''}">▾</span>
                        </div>
                        <div class="project-children${_projectOpen.has(gi) ? ' open' : ''}">
                            ${g.products.map(p => `
                                <div class="project-item${val === p ? ' active' : ''}"
                                     onclick="pickProject(event,'prod','${p}')">${p}</div>
                            `).join('')}
                        </div>
                    </div>`;
                }).join('')}
            </div>`;

        } else {
            const val = sel[curType][opt.key];
            pillVal = val;
            ddInner = `<div class="dd-section">
                <div class="dd-section-title">${opt.label}</div>
                <div class="dd-chips">
                    ${opt.values.map(v =>
                        `<span class="dd-chip${v===val?' active':''}"
                               onclick="pickOpt(event,'${opt.key}','${v}')">${v}</span>`
                    ).join('')}
                </div>
            </div>`;
        }

        if (opt.type === 'project') {
            pill.title = '选择您的目标产品或品类（单选），生成内容将结合该产品特点与目标人群进行优化';
        }

        const clearBtn = (opt.type === 'project' && sel[curType].project)
            ? `<button class="pill-clear" onclick="clearProject(event)">✕</button>` : '';

        pill.innerHTML = `
            <span class="opt-pill-val">${pillVal}</span>${clearBtn}
            <span class="arr">▾</span>
            <div class="opt-dd" id="dd-${opt.key}">${ddInner}</div>`;

        pill.addEventListener('click', e => {
            e.stopPropagation();
            const dd = pill.querySelector('.opt-dd');
            const isOpen = pill.classList.contains('open');
            closeAll();
            if (!isOpen) { pill.classList.add('open'); dd.classList.add('show'); }
        });

        area.appendChild(pill);
    });
}

function confirmCount(e) {
    e.stopPropagation();
    const input = document.getElementById('countCustomInput');
    const v = parseInt(input?.value);
    if (!v || v < 1) return;
    sel[curType].count = String(Math.min(99, v));
    closeAll();
    renderOpts();
}

function onCountKey(e) {
    if (e.key === 'Enter') confirmCount(e);
}

function onCountInput(e) {
    const v = parseInt(e.target.value);
    if (!v || v < 1) return;
    sel[curType].count = String(Math.min(99, v));
    const pill = document.getElementById('pill-count');
    const unit = curType === 'video' ? '个' : '张';
    if (pill) pill.querySelector('.opt-pill-val').textContent = `${sel[curType].count} ${unit}`;
}

function pickOpt(e, key, val) {
    e.stopPropagation();
    sel[curType][key] = val;
    closeAll();
    renderOpts();
    if (curType === 'video' && key === 'mode') renderKeyframeStrip();
}

function toggleModel(e, modelId) {
    e.stopPropagation();
    const ms = sel[curType].models;
    const idx = ms.indexOf(modelId);
    if (idx >= 0) {
        if (ms.length <= 1) return; // 至少保留一个
        ms.splice(idx, 1);
        if (ms.length === 1) {
            // 回到单选模式：同步 count
            sel[curType].count = sel[curType].modelCounts[ms[0]] || sel[curType].count || '1';
            sel[curType].modelCounts = {};
        } else {
            delete sel[curType].modelCounts[modelId];
        }
    } else {
        ms.push(modelId);
        if (ms.length === 2) {
            // 首次进入多选：为所有已选模型初始化张数
            ms.forEach(id => {
                if (!sel[curType].modelCounts[id])
                    sel[curType].modelCounts[id] = sel[curType].count || '1';
            });
        } else {
            sel[curType].modelCounts[modelId] = sel[curType].count || '1';
        }
    }
    reopenModelPanel();
}

function setModelCount(e, modelId) {
    e.stopPropagation();
    const v = parseInt(e.target.value);
    if (v && v >= 1) {
        sel[curType].modelCounts[modelId] = String(Math.min(99, v));
    }
}

function reopenModelPanel() {
    renderOpts();
    const pill = document.getElementById('pill-model');
    const dd = document.getElementById('dd-model');
    if (pill && dd) { pill.classList.add('open'); dd.classList.add('show'); }
}

const _projectOpen = new Set();

function pickProject(e, type, value) {
    e.stopPropagation();
    sel[curType].project = sel[curType].project === value ? '' : value;
    // 选中品类后自动收起该组
    if (type === 'cat') {
        const gi = PROJECTS.findIndex(g => g.category === value);
        if (gi >= 0) _projectOpen.delete(gi);
    }
    closeAll();
    renderOpts();
}

function toggleProjectGroup(e, gi) {
    e.stopPropagation();
    if (_projectOpen.has(gi)) _projectOpen.delete(gi);
    else _projectOpen.add(gi);
    // 只刷新展开状态，不关闭面板
    const children = document.querySelectorAll('.project-children')[gi];
    const arr = document.querySelectorAll('.project-expand-arr')[gi];
    if (children) children.classList.toggle('open');
    if (arr) arr.classList.toggle('open');
}

function clearProject(e) {
    e.stopPropagation();
    sel[curType].project = '';
    closeAll();
    renderOpts();
}

function pickRatioRes(e, type, val) {
    e.stopPropagation();
    if (type === 'ratio') { sel[curType].ratio = val; sel[curType].platformSize = null; }
    else sel[curType].res = val;
    updateSize(sel[curType].ratio, sel[curType].res);
    reopenRatioPanel();
}

function switchRatioTab(e, tab) {
    e.stopPropagation();
    sel[curType].ratioTab = tab;
    sel[curType].platformSize = null; // 切换平台时清空当前选中尺寸
    reopenRatioPanel();
}

function pickPlatformPreset(e, w, h, ratio) {
    e.stopPropagation();
    sel[curType].platformSize = { w, h, ratio: ratio || null };
    sel[curType].sizeW = w;
    sel[curType].sizeH = h;
    if (ratio) sel[curType].ratio = ratio;
    reopenRatioPanel();
}

let editingCustomIndex = -1;

function showCustomInput(e) {
    e.stopPropagation();
    editingCustomIndex = -1;
    const row = document.getElementById('customInputRow');
    if (row) {
        row.style.display = 'flex';
        const wInput = document.getElementById('customW');
        const hInput = document.getElementById('customH');
        wInput.value = ''; hInput.value = '';
        wInput.focus();
    }
}

function cancelCustomInput(e) {
    e.stopPropagation();
    editingCustomIndex = -1;
    const row = document.getElementById('customInputRow');
    if (row) row.style.display = 'none';
}

function saveCustomRatio(e) {
    e.stopPropagation();
    const w = parseInt(document.getElementById('customW')?.value);
    const h = parseInt(document.getElementById('customH')?.value);
    if (!w || !h || w < 1 || h < 1) { showToast('请输入有效的宽高值'); return; }
    const ratio = `${w}:${h}`;
    const customs = sel[curType].customRatios || [];
    if (editingCustomIndex >= 0) {
        customs[editingCustomIndex] = ratio;
    } else {
        if (customs.length >= 5) { showToast('最多添加 5 个自定义比例'); return; }
        customs.push(ratio);
    }
    sel[curType].customRatios = customs;
    editingCustomIndex = -1;
    sel[curType].ratio = ratio;
    updateSize(ratio, sel[curType].res);
    reopenRatioPanel();
}

function editCustomRatio(e, index) {
    e.stopPropagation();
    const customs = sel[curType].customRatios || [];
    const parts = customs[index].split(':').map(Number);
    editingCustomIndex = index;
    const row = document.getElementById('customInputRow');
    if (row) {
        row.style.display = 'flex';
        document.getElementById('customW').value = parts[0] || '';
        document.getElementById('customH').value = parts[1] || '';
        document.getElementById('customW').focus();
    }
}

function deleteCustomRatio(e, index) {
    e.stopPropagation();
    const customs = sel[curType].customRatios || [];
    const removed = customs.splice(index, 1)[0];
    if (sel[curType].ratio === removed) {
        sel[curType].ratio = '1:1';
        updateSize('1:1', sel[curType].res);
    }
    reopenRatioPanel();
}

function onCustomKey(e) {
    if (e.key === 'Enter') { saveCustomRatio(e); }
    else if (e.key === 'Escape') { cancelCustomInput(e); }
}

function reopenRatioPanel() {
    renderOpts();
    const pill = document.getElementById('pill-ratio-dur') || document.getElementById('pill-ratio-res');
    const dd   = document.getElementById('dd-ratio-dur')   || document.getElementById('dd-ratio-res');
    if (pill && dd) { pill.classList.add('open'); dd.classList.add('show'); }
}

function openHistory() {
    parent.postMessage({ action: 'openTab', title: '生成详情', url: 'AI 创作/生成详情.html' }, '*');
}

function switchType(btn) {
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    curType = btn.dataset.type;
    const isChat = curType === 'chat';

    // 上传区 & 参考图条
    if (!document.getElementById('refAddBtn')) {
        document.getElementById('uploadBlock').style.display = isChat ? 'none' : '';
    }
    document.getElementById('refStrip').style.display = isChat ? 'none' : '';
    renderKeyframeStrip();

    // 选项区 vs 对话工具
    document.getElementById('optArea').style.display = isChat ? 'none' : 'flex';
    document.getElementById('chatExtra').style.display = isChat ? 'flex' : 'none';
    if (!isChat) document.getElementById('parseBtn').style.display =
        document.querySelector('.ref-item') ? '' : 'none';
    else document.getElementById('parseBtn').style.display = 'none';

    // 发送/生成按钮外观
    const genBtn = document.getElementById('genBtn');
    const genText = document.getElementById('genText');
    if (isChat) {
        genBtn.classList.add('send-mode');
        genText.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>`;
    } else {
        genBtn.classList.remove('send-mode');
        genText.innerHTML = '生成';
    }

    // placeholder
    const ph = { chat: '发送消息给 AI...', image: '尝试描述您想要创建的图像', video: '尝试描述您想要创建的视频' };
    document.getElementById('prompt').placeholder = ph[curType] || '';

    closeAll();
    if (!isChat) renderOpts();
}

function useWorkflow(type) {
    if (type === 'image') {
        parent.postMessage({ action: 'openTab', title: '图像素材衍生', url: 'AI 创作/图像素材衍生工作流.html' }, '*');
        return;
    }
    const btn = document.querySelector(`.type-btn[data-type="${type}"]`);
    if (btn) switchType(btn);
    document.getElementById('prompt').focus();
}

function doGenerate() {
    const txt = document.getElementById('prompt').value.trim();
    if (!txt) { document.getElementById('prompt').focus(); return; }
    if (document.getElementById('genBtn').classList.contains('loading')) return;
    localStorage.setItem('pendingGen', JSON.stringify({
        type: curType,
        prompt: txt,
        opts: sel[curType] ? JSON.parse(JSON.stringify(sel[curType])) : {}
    }));
    parent.postMessage({ action: 'openTab', title: '生成详情', url: 'AI 创作/生成详情.html' }, '*');
}

function closeAll() {
    document.querySelectorAll('.opt-pill.open').forEach(p => p.classList.remove('open'));
    document.querySelectorAll('.opt-dd.show').forEach(d => d.classList.remove('show'));
}

let _tt;
function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(_tt);
    _tt = setTimeout(() => el.classList.remove('show'), 2400);
}

document.addEventListener('click', closeAll);

updateSize(sel.image.ratio, sel.image.res);
renderOpts();
</script>
</body>
</html>
