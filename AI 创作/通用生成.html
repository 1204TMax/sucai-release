function renderOpts() {
    const area = document.getElementById('optArea');
    area.dataset.type = curType;
    area.innerHTML = '';

    // 动态计算图像模式下选项顺序
    let opts;
    if (curType === 'image') {
        const isMulti = sel.image.models.length > 1;
        const base = OPTS.image;
        if (isMulti) {
            // 多模型：模型(含张数), 比例, 项目
            opts = [base[0], base[1], base[3]];
        } else {
            // 单模型：模型, 张数, 比例, 项目
            opts = [base[0], base[2], base[1], base[3]];
        }
    } else if (curType === 'video') {
        const isMulti = sel.video.models.length > 1;
        const base = OPTS.video;
        if (isMulti) {
            // 多模型：模型(含张数), 模式, 比例+时长, 项目
            opts = [base[0], base[2], base[3], base[4]];
        } else {
            // 单模型：模型, 数量, 模式, 比例+时长, 项目
            opts = [base[0], base[1], base[2], base[3], base[4]];
        }
    } else {
        opts = OPTS[curType];
    }

    opts.forEach(opt => {
        const pill = document.createElement('div');
        pill.className = 'opt-pill';
        pill.id = 'pill-' + opt.key;

        let pillVal = '', ddInner = '';

        if (opt.type === 'model') {
            const modelList = curType === 'video' ? VIDEO_MODELS : MODELS;
            const models = sel[curType].models || [modelList[0].id];
            const isMulti = models.length > 1;

            if (isMulti) {
                const firstName = (modelList.find(x => x.id === models[0]) || modelList[0]).name;
                const countUnit = curType === 'video' ? '个' : '张';
                pillVal = `${firstName} 等 ${models.length} 个模型`;
                ddInner = `<div class="dd-section">
                    <div class="dd-section-title">模型与张数</div>
                    <div class="model-list">
                        ${modelList.map(mx => {
                            const checked = models.includes(mx.id);
                            const cnt = sel[curType].modelCounts[mx.id] || '1';
                            return `<div class="model-opt-row" data-desc="${mx.desc}"
                                         onclick="toggleModel(event,'${mx.id}')">
                                <div class="model-check${checked ? ' active' : ''}"></div>
                                <span class="model-opt-name">${mx.name}</span>
                                ${checked ? `<div class="model-count-wrap" onclick="event.stopPropagation()">
                                    <input class="model-count-input" type="number" min="1" max="99"
                                           value="${cnt}"
                                           onchange="setModelCount(event,'${mx.id}')"
                                           onkeydown="if(event.key==='Enter'){event.target.blur()}">
                                    <span class="model-count-unit">${countUnit}</span>
                                </div>` : ''}
                            </div>`;
                        }).join('')}
                    </div>
                </div>`;
            } else {
                const m = modelList.find(x => x.id === models[0]) || modelList[0];
                pillVal = m.name;
                ddInner = `<div class="dd-section">
                    <div class="dd-section-title">模型</div>
                    <div class="model-list">
                        ${modelList.map(mx => {
                            const checked = models.includes(mx.id);
                            return `<div class="model-opt-row" data-desc="${mx.desc}"
                                         onclick="toggleModel(event,'${mx.id}')">
                                <div class="model-check${checked ? ' active' : ''}"></div>
                                <span class="model-opt-name">${mx.name}</span>
                            </div>`;
                        }).join('')}
                    </div>
                </div>`;
            }

        } else if (opt.type === 'ratio-res') {
            const ratio = sel[curType].ratio;
            const res   = sel[curType].res;
            const resLabel = res === '4K' ? '超清 4K' : res === '1K' ? '1K' : '高清 2K';
            const customRatios = sel[curType].customRatios || [];
            const ratioTab = sel[curType].ratioTab || '常用';
            const ps = sel[curType].platformSize;

            // Compute pill ratio icon
            let rw = 14, rh = 14;
            if (ratioTab !== '常用' && ps) {
                rw = ps.w; rh = ps.h;
            } else if (RATIO_SIZES[ratio]) {
                [rw, rh] = RATIO_SIZES[ratio];
            } else {
                const ratioNums = ratio.split(':').map(Number);
                if (ratioNums.length === 2 && ratioNums[1]) {
                    const mx = 16;
                    if (ratioNums[0] >= ratioNums[1]) { rw = mx; rh = Math.round(mx * ratioNums[1] / ratioNums[0]); }
                    else { rh = mx; rw = Math.round(mx * ratioNums[0] / ratioNums[1]); }
                }
            }
            const sc = 11 / Math.max(rw, rh);
            const iw = Math.round(rw * sc), ih = Math.round(rh * sc);

            if (ratioTab !== '常用' && ps) {
                pillVal = `${ps.w}×${ps.h} · ${resLabel}`;
            } else {
                pillVal = `${ratio} · ${resLabel}`;
            }

            // Platform tab bar
            const tabBar = `<div class="ratio-platform-tabs">
                ${PLATFORM_TABS.map(t =>
                    `<div class="ratio-platform-tab${t === ratioTab ? ' active' : ''}"
                          onclick="switchRatioTab(event,'${t}')">${t}</div>`
                ).join('')}
            </div>`;

            // Preset ratio content (swaps based on active tab)
            let presetContent;
            if (ratioTab === '常用') {
                presetContent = `<div class="ratio-row">
                    ${opt.ratioValues.map(v => {
                        const [w, h] = RATIO_SIZES[v] || [14, 14];
                        return `<div class="ratio-chip${v === ratio ? ' active' : ''}"
                                     onclick="pickRatioRes(event,'ratio','${v}')">
                            <div class="ratio-box" style="width:${w}px;height:${h}px;"></div>
                            <span class="ratio-lbl">${v}</span>
                        </div>`;
                    }).join('')}
                </div>`;
            } else {
                const presets = PLATFORM_PRESETS[ratioTab] || [];
                if (presets.length === 0) {
                    presetContent = `<div class="platform-empty">暂未配置，敬请期待</div>`;
                } else {
                    presetContent = `<div class="ratio-row" style="flex-wrap:nowrap;">
                        ${presets.map(p => {
                            const isActive = ps && ps.w === p.w && ps.h === p.h;
                            const mx = 16;
                            let cw = mx, ch = mx;
                            if (p.w >= p.h) { cw = mx; ch = Math.round(mx * p.h / p.w); }
                            else { ch = mx; cw = Math.round(mx * p.w / p.h); }
                            return `<div class="ratio-chip platform${isActive ? ' active' : ''}"
                                         onclick="pickPlatformPreset(event,${p.w},${p.h},'${p.ratio || ''}')">
                                <div class="platform-chip-icon">
                                    <div class="ratio-box" style="width:${cw}px;height:${ch}px;"></div>
                                </div>
                                <span class="ratio-lbl">${p.w}×${p.h}</span>
                                <span class="ratio-sub">${p.ratio || ''}</span>
                            </div>`;
                        }).join('')}
                    </div>`;
                }
            }

            // Build custom ratio chips
            const customChips = customRatios.map((cr, i) => {
                const parts = cr.split(':').map(Number);
                let cw = 14, ch = 14;
                if (parts.length === 2 && parts[1]) {
                    const mx = 16;
                    if (parts[0] >= parts[1]) { cw = mx; ch = Math.round(mx * parts[1] / parts[0]); }
                    else { ch = mx; cw = Math.round(mx * parts[0] / parts[1]); }
                }
                return `<div class="ratio-chip custom${cr===ratio?' active':''}"
                             onclick="pickRatioRes(event,'ratio','${cr}')">
                    <div class="chip-actions">
                        <span class="chip-action" onclick="editCustomRatio(event,${i})" title="编辑">✎</span>
                        <span class="chip-action" onclick="deleteCustomRatio(event,${i})" title="删除">✕</span>
                    </div>
                    <div class="ratio-box" style="width:${cw}px;height:${ch}px;"></div>
                    <span class="ratio-lbl">${cr}</span>
                </div>`;
            }).join('');

            const addBtn = customRatios.length < 5
                ? `<div class="custom-add-btn" onclick="showCustomInput(event)">+ 添加自定义比例</div>`
                : '';

            ddInner = `<div class="dd-section">
                <div class="dd-section-title">比例</div>
                ${tabBar}
                ${presetContent}
            </div>
            <div class="dd-section">
                <div class="dd-section-title">自定义比例</div>
                ${customRatios.length ? `<div class="ratio-row">${customChips}</div>` : ''}
                ${addBtn}
                <div class="custom-input-row" id="customInputRow" style="display:none;">
                    <input type="number" class="custom-input" id="customW" placeholder="宽"
                           min="1" max="9999" onclick="event.stopPropagation()" onkeydown="onCustomKey(event)">
                    <span class="custom-sep">:</span>
                    <input type="number" class="custom-input" id="customH" placeholder="高"
                           min="1" max="9999" onclick="event.stopPropagation()" onkeydown="onCustomKey(event)">
                    <button class="custom-confirm" onclick="saveCustomRatio(event)">✓</button>
                    <button class="custom-cancel" onclick="cancelCustomInput(event)">✕</button>
                </div>
            </div>
            ${opt.showRes !== false ? `<div class="dd-section">
                <div class="dd-section-title">质量</div>
                <div class="res-toggle">
                    <div class="res-large${res==='1K'?' active':''}" onclick="pickRatioRes(event,'res','1K')">1K</div>
                    <div class="res-large${res==='2K'?' active':''}" onclick="pickRatioRes(event,'res','2K')">高清 2K</div>
                    <div class="res-large${res==='4K'?' active':''}" onclick="pickRatioRes(event,'res','4K')">超清 4K <span class="res-star">✦</span></div>
                </div>
            </div>` : ''}`;

        } else if (opt.type === 'ratio-dur') {
            const ratio = sel[curType].ratio || '16:9';
            const ratioTab = sel[curType].ratioTab || '常用';
            const ps = sel[curType].platformSize;

            // pill 图标
            let rw = 14, rh = 14;
            if (ratioTab !== '常用' && ps) { rw = ps.w; rh = ps.h; }
            else if (RATIO_SIZES[ratio]) { [rw, rh] = RATIO_SIZES[ratio]; }
            const sc = 11 / Math.max(rw, rh);
            const iw = Math.round(rw * sc), ih = Math.round(rh * sc);
            const ratioDisplay = (ratioTab !== '常用' && ps) ? `${ps.w}×${ps.h}` : ratio;
            const dur = sel[curType].dur || '5秒';
            pillVal = `${ratioDisplay} · ${dur}`;

            // 平台 tab bar
            const tabBar = `<div class="ratio-platform-tabs">
                ${PLATFORM_TABS.map(t =>
                    `<div class="ratio-platform-tab${t === ratioTab ? ' active' : ''}"
                          onclick="switchRatioTab(event,'${t}')">${t}</div>`
                ).join('')}
            </div>`;

            // 预设比例内容
            let presetContent;
            if (ratioTab === '常用') {
                presetContent = `<div class="ratio-row">
                    ${opt.ratioValues.map(v => {
                        const [w, h] = RATIO_SIZES[v] || [14, 14];
                        return `<div class="ratio-chip${v === ratio ? ' active' : ''}"
                                     onclick="pickRatioRes(event,'ratio','${v}')">
                            <div class="ratio-box" style="width:${w}px;height:${h}px;"></div>
                            <span class="ratio-lbl">${v}</span>
                        </div>`;
                    }).join('')}
                </div>`;
            } else {
                const presets = PLATFORM_PRESETS[ratioTab] || [];
                if (presets.length === 0) {
                    presetContent = `<div class="platform-empty">暂未配置，敬请期待</div>`;
                } else {
                    presetContent = `<div class="ratio-row" style="flex-wrap:nowrap;">
                        ${presets.map(p => {
                            const isActive = ps && ps.w === p.w && ps.h === p.h;
                            const mx = 16;
                            let cw = mx, ch = mx;
                            if (p.w >= p.h) { cw = mx; ch = Math.round(mx * p.h / p.w); }
                            else { ch = mx; cw = Math.round(mx * p.w / p.h); }
                            return `<div class="ratio-chip platform${isActive ? ' active' : ''}"
                                         onclick="pickPlatformPreset(event,${p.w},${p.h},'${p.ratio || ''}')">
                                <div class="platform-chip-icon">
                                    <div class="ratio-box" style="width:${cw}px;height:${ch}px;"></div>
                                </div>
                                <span class="ratio-lbl">${p.w}×${p.h}</span>
                                <span class="ratio-sub">${p.ratio || ''}</span>
                            </div>`;
                        }).join('')}
                    </div>`;
                }
            }

            ddInner = `<div class="dd-section">
                <div class="dd-section-title">比例</div>
                ${tabBar}
                ${presetContent}
            </div>
            <div class="dd-section">
                <div class="dd-section-title">时长</div>
                <div class="dd-chips">
                    ${(opt.durValues || ['5秒','10秒','15秒','30秒']).map(v =>
                        `<span class="dd-chip${v===dur?' active':''}"
                               onclick="pickDur(event,'${v}')">${v}</span>`
                    ).join('')}
                </div>
            </div>`;

        } else if (opt.type === 'ratio') {
            const val = sel[curType][opt.key] || opt.def;
            const [rw, rh] = RATIO_SIZES[val] || [14, 14];
            const sc = 11 / Math.max(rw, rh);
            const iw = Math.round(rw * sc), ih = Math.round(rh * sc);
            pillVal = `<span class="pill-ratio-box" style="width:${iw}px;height:${ih}px;"></span>${val}`;
            ddInner = `<div class="dd-section">
                <div class="dd-section-title">${opt.label}</div>
                <div class="ratio-row">
                    ${opt.values.map(v => {
                        const [w,h] = RATIO_SIZES[v] || [14,14];
                        return `<div class="ratio-chip${v===val?' active':''}"
                                     onclick="pickOpt(event,'${opt.key}','${v}')">
                            <div class="ratio-box" style="width:${w}px;height:${h}px;"></div>
                            <span class="ratio-lbl">${v}</span>
                        </div>`;
                    }).join('')}
                </div>
            </div>`;

        } else if (opt.type === 'chips') {
            const val = sel[curType][opt.key] || opt.def;
            pillVal = val;
            ddInner = `<div class="dd-section">
                <div class="dd-section-title">${opt.label}</div>
                <div class="dd-chips">
                    ${opt.values.map(v =>
                        `<span class="dd-chip${v===val?' active':''}"
                               onclick="pickOpt(event,'${opt.key}','${v}')">${v}</span>`
                    ).join('')}
                </div>
            </div>`;

        } else if (opt.type === 'res') {
            const val = sel[curType][opt.key] || opt.def;
            pillVal = val;
            ddInner = `<div class="dd-section">
                <div class="dd-section-title">${opt.label}</div>
                <div class="dd-chips">
                    ${opt.values.map(v =>
                        `<span class="dd-chip${v===val?' active':''}"
                               onclick="pickOpt(event,'${opt.key}','${v}')">${v}</span>`
                    ).join('')}
                </div>
            </div>`;

        } else if (opt.type === 'count') {
            const val = sel[curType].count || '1';
            const unit = opt.unit || '张';
            const isCustom = !opt.values.includes(val);
            pillVal = val + ' ' + unit;
            ddInner = `<div class="dd-section">
                <div class="dd-section-title">生成数量</div>
                <div class="dd-chips" style="flex-wrap:nowrap;">
                    ${opt.values.map(v =>
                        `<span class="dd-chip${v===val?' active':''}"
                               onclick="pickOpt(event,'count','${v}')">${v}</span>`
                    ).join('')}
                    <span class="count-custom-wrap">
                        <input class="count-custom-input${isCustom?' active':''}"
                               id="countCustomInput"
                               type="number" min="1" max="99"
                               value="${isCustom ? val : ''}"
                               placeholder="自定义"
                               onclick="event.stopPropagation()"
                               onkeydown="onCountKey(event)">
                        <button class="count-confirm-btn" onclick="confirmCount(event)">确认</button>
                    </span>
                </div>
            </div>`;

        } else if (opt.type === 'project') {
            const val = sel[curType].project || '';
            pillVal = val || '项目';
            ddInner = null;

        } else if (opt.type === 'chat-model') {
            const mid = sel.chat.model;
            const allModels = [...CHAT_MODELS.fast, ...CHAT_MODELS.smart];
            const m = allModels.find(x => x.id === mid) || CHAT_MODELS.fast[0];
            pillVal = m.name;
            const renderTier = (list) => list.map(mx =>
                `<div class="model-opt-row" data-desc="${mx.desc}"
                      onclick="pickChatModel(event,'${mx.id}')">
                    <div class="model-radio${mx.id === mid ? ' active' : ''}"></div>
                    <span class="model-opt-name">${mx.name}</span>
                </div>`
            ).join('');
            ddInner = `<div class="dd-section" style="padding-bottom:0">
                <div class="cm-tier-label">快速</div>
                <div class="model-list">${renderTier(CHAT_MODELS.fast)}</div>
                <div class="cm-tier-label">智能</div>
                <div class="model-list">${renderTier(CHAT_MODELS.smart)}</div>
            </div>`;

        } else if (opt.type === 'toggle') {
            const on = !!sel[curType][opt.key];
            const iconThink = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>`;
            const iconSearch = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`;
            const icon = opt.key === 'think' ? iconThink : iconSearch;
            pillVal = `${icon} ${opt.label}`;
            if (on) pill.classList.add('on');
            pill.classList.add('toggle-pill');
            ddInner = null;

        } else if (opt.type === 'upload-btn') {
            const icon = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;
            pillVal = `${icon} ${opt.label}`;
            pill.classList.add('toggle-pill');
            ddInner = null;

        } else {
            const val = sel[curType][opt.key];
            pillVal = val;
            ddInner = `<div class="dd-section">
                <div class="dd-section-title">${opt.label}</div>
                <div class="dd-chips">
                    ${opt.values.map(v =>
                        `<span class="dd-chip${v===val?' active':''}"
                               onclick="pickOpt(event,'${opt.key}','${v}')">${v}</span>`
                    ).join('')}
                </div>
            </div>`;
        }

        if (opt.type === 'project') {
            pill.title = '选择您的目标产品或品类（单选），生成内容将结合该产品特点与目标人群进行优化';
        }

        const clearBtn = (opt.type === 'project' && sel[curType].project)
            ? `<button class="pill-clear" onclick="event.stopPropagation();onProjectConfirm('')">✕</button>` : '';

        if (ddInner === null) {
            if (opt.type === 'project') {
                // project pill：无下拉，有清除按钮
                pill.innerHTML = `<span class="opt-pill-val">${pillVal}</span>${clearBtn}`;
            } else {
                // toggle pill — no dropdown, no arrow
                pill.innerHTML = `<span class="opt-pill-val">${pillVal}</span>`;
            }
        } else {
            pill.innerHTML = `
                <span class="opt-pill-val">${pillVal}</span>${clearBtn}
                <span class="arr">▾</span>
                <div class="opt-dd" id="dd-${opt.key}">${ddInner}</div>`;
        }

        pill.addEventListener('click', e => {
            e.stopPropagation();
            if (opt.type === 'toggle') {
                sel[curType][opt.key] = !sel[curType][opt.key];
                renderOpts();
                return;
            }
            if (opt.type === 'upload-btn') {
                setTimeout(() => document.getElementById('chatFileInput').click(), 0);
                return;
            }
            if (opt.type === 'project') {
                openProjModal();
                return;
            }
            const dd = pill.querySelector('.opt-dd');
            const isOpen = pill.classList.contains('open');
            closeAll();
            if (!isOpen) { pill.classList.add('open'); dd.classList.add('show'); }
        });

        area.appendChild(pill);
    });
}

function pickChatModel(e, id) {
    e.stopPropagation();
    sel.chat.model = id;
    closeAll();
    renderOpts();
}

function confirmCount(e) {
    e.stopPropagation();
    const input = document.getElementById('countCustomInput');
    const v = parseInt(input?.value);
    if (!v || v < 1) return;
    sel[curType].count = String(Math.min(99, v));
    closeAll();
    renderOpts();
}

function onCountKey(e) {
    if (e.key === 'Enter') confirmCount(e);
}

function onCountInput(e) {
    const v = parseInt(e.target.value);
    if (!v || v < 1) return;
    sel[curType].count = String(Math.min(99, v));
    const pill = document.getElementById('pill-count');
    const unit = curType === 'video' ? '个' : '张';
    if (pill) pill.querySelector('.opt-pill-val').textContent = `${sel[curType].count} ${unit}`;
}

function pickOpt(e, key, val) {
    e.stopPropagation();
    sel[curType][key] = val;
    closeAll();
    renderOpts();
    if (curType === 'video' && key === 'mode') renderKeyframeStrip();
}

function toggleModel(e, modelId) {
    e.stopPropagation();
    const ms = sel[curType].models;
    const idx = ms.indexOf(modelId);
    if (idx >= 0) {
        if (ms.length <= 1) return; // 至少保留一个
        ms.splice(idx, 1);
        if (ms.length === 1) {
            // 回到单选模式：同步 count
            sel[curType].count = sel[curType].modelCounts[ms[0]] || sel[curType].count || '1';
            sel[curType].modelCounts = {};
        } else {
            delete sel[curType].modelCounts[modelId];
        }
    } else {
        ms.push(modelId);
        if (ms.length === 2) {
            // 首次进入多选：为所有已选模型初始化张数
            ms.forEach(id => {
                if (!sel[curType].modelCounts[id])
                    sel[curType].modelCounts[id] = sel[curType].count || '1';
            });
        } else {
            sel[curType].modelCounts[modelId] = sel[curType].count || '1';
        }
    }
    reopenModelPanel();
}

function setModelCount(e, modelId) {
    e.stopPropagation();
    const v = parseInt(e.target.value);
    if (v && v >= 1) {
        sel[curType].modelCounts[modelId] = String(Math.min(99, v));
    }
}

function reopenModelPanel() {
    renderOpts();
    const pill = document.getElementById('pill-model');
    const dd = document.getElementById('dd-model');
    if (pill && dd) { pill.classList.add('open'); dd.classList.add('show'); }
}

const _projectOpen = new Set();

function pickDur(e, val) {
    e.stopPropagation();
    sel[curType].dur = val;
    reopenRatioPanel();
}

function pickRatioRes(e, type, val) {
    e.stopPropagation();
    if (type === 'ratio') { sel[curType].ratio = val; sel[curType].platformSize = null; }
    else sel[curType].res = val;
    updateSize(sel[curType].ratio, sel[curType].res);
    reopenRatioPanel();
}

function switchRatioTab(e, tab) {
    e.stopPropagation();
    sel[curType].ratioTab = tab;
    sel[curType].platformSize = null; // 切换平台时清空当前选中尺寸
    reopenRatioPanel();
}

function pickPlatformPreset(e, w, h, ratio) {
    e.stopPropagation();
    sel[curType].platformSize = { w, h, ratio: ratio || null };
    sel[curType].sizeW = w;
    sel[curType].sizeH = h;
    if (ratio) sel[curType].ratio = ratio;
    reopenRatioPanel();
}

let editingCustomIndex = -1;

function showCustomInput(e) {
    e.stopPropagation();
    editingCustomIndex = -1;
    const row = document.getElementById('customInputRow');
    if (row) {
        row.style.display = 'flex';
        const wInput = document.getElementById('customW');
        const hInput = document.getElementById('customH');
        wInput.value = ''; hInput.value = '';
        wInput.focus();
    }
}

function cancelCustomInput(e) {
    e.stopPropagation();
    editingCustomIndex = -1;
    const row = document.getElementById('customInputRow');
    if (row) row.style.display = 'none';
}

function saveCustomRatio(e) {
    e.stopPropagation();
    const w = parseInt(document.getElementById('customW')?.value);
    const h = parseInt(document.getElementById('customH')?.value);
    if (!w || !h || w < 1 || h < 1) { showToast('请输入有效的宽高值'); return; }
    const ratio = `${w}:${h}`;
    const customs = sel[curType].customRatios || [];
    if (editingCustomIndex >= 0) {
        customs[editingCustomIndex] = ratio;
    } else {
        if (customs.length >= 5) { showToast('最多添加 5 个自定义比例'); return; }
        customs.push(ratio);
    }
    sel[curType].customRatios = customs;
    editingCustomIndex = -1;
    sel[curType].ratio = ratio;
    updateSize(ratio, sel[curType].res);
    reopenRatioPanel();
}

function editCustomRatio(e, index) {
    e.stopPropagation();
    const customs = sel[curType].customRatios || [];
    const parts = customs[index].split(':').map(Number);
    editingCustomIndex = index;
    const row = document.getElementById('customInputRow');
    if (row) {
        row.style.display = 'flex';
        document.getElementById('customW').value = parts[0] || '';
        document.getElementById('customH').value = parts[1] || '';
        document.getElementById('customW').focus();
    }
}

function deleteCustomRatio(e, index) {
    e.stopPropagation();
    const customs = sel[curType].customRatios || [];
    const removed = customs.splice(index, 1)[0];
    if (sel[curType].ratio === removed) {
        sel[curType].ratio = '1:1';
        updateSize('1:1', sel[curType].res);
    }
    reopenRatioPanel();
}

function onCustomKey(e) {
    if (e.key === 'Enter') { saveCustomRatio(e); }
    else if (e.key === 'Escape') { cancelCustomInput(e); }
}

function reopenRatioPanel() {
    renderOpts();
    const pill = document.getElementById('pill-ratio-dur') || document.getElementById('pill-ratio-res');
    const dd   = document.getElementById('dd-ratio-dur')   || document.getElementById('dd-ratio-res');
    if (pill && dd) { pill.classList.add('open'); dd.classList.add('show'); }
}

function openHistory() {
    parent.postMessage({ action: 'openTab', title: '生成详情', url: 'AI 创作/生成详情.html' }, '*');
}

function switchType(btn) {
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    curType = btn.dataset.type;
    const isChat = curType === 'chat';

    // 上传区 & 参考图条（对话模式与图像/视频模式保持一致）
    if (!document.getElementById('refAddBtn')) {
        document.getElementById('uploadBlock').style.display = '';
    }
    document.getElementById('chatAttachBtn').style.display = 'none';
    if (!isChat) {
        chatAttachments = [];
        document.getElementById('chatAttachStrip').style.display = 'none';
        document.getElementById('chatAttachStrip').innerHTML = '';
    }
    renderKeyframeStrip();

    // 选项区 vs 对话工具
    document.getElementById('optArea').style.display = 'flex';
    document.getElementById('chatExtra').style.display = 'none';
    syncToolboxParseState();
    syncToolboxFormatState();

    // 发送/生成按钮外观
    const genBtn = document.getElementById('genBtn');
    const genText = document.getElementById('genText');
    genBtn.classList.remove('send-mode');
    genText.innerHTML = '生成';

    // placeholder
    const ph = { chat: '尝试描述你想要的文本内容', image: '尝试描述您想要创建的图像', video: '尝试描述您想要创建的视频' };
    document.getElementById('prompt').placeholder = ph[curType] || '';

    closeAll();
    renderOpts();
}

function useWorkflow(type) {
    if (type === 'image') {
        parent.postMessage({ action: 'openTab', title: '工作流-裂变', url: 'AI 创作/工作流-裂变.html' }, '*');
        return;
    }
    const btn = document.querySelector(`.type-btn[data-type="${type}"]`);
    if (btn) switchType(btn);
    document.getElementById('prompt').focus();
}

function doGenerate() {
    const txt = document.getElementById('prompt').value.trim();
    if (!txt) { document.getElementById('prompt').focus(); return; }
    if (document.getElementById('genBtn').classList.contains('loading')) return;
    localStorage.setItem('pendingGen', JSON.stringify({
        type: curType,
        prompt: txt,
        opts: sel[curType] ? JSON.parse(JSON.stringify(sel[curType])) : {}
    }));
    showNotif();
    parent.postMessage({ action: 'openTab', title: '生成详情', url: 'AI 创作/生成详情.html' }, '*');
}

function closeAll(e) {
    if (e) {
        const toolboxWrap = document.getElementById('toolboxWrap');
        if (toolboxWrap && toolboxWrap.contains(e.target)) return;
    }
    document.querySelectorAll('.opt-pill.open').forEach(p => p.classList.remove('open'));
    document.querySelectorAll('.opt-dd.show').forEach(d => d.classList.remove('show'));
    unpinToolboxPanel();
}

let _tt;
function showToast(msg, type) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.toggle('error', type === 'error');
    el.classList.toggle('ghost', type === 'ghost');
    el.classList.add('show');
    clearTimeout(_tt);
    _tt = setTimeout(() => el.classList.remove('show'), 2400);
}

let _nt;
function showNotif() {
    const el = document.getElementById('notif');
    el.classList.add('show');
    clearTimeout(_nt);
    _nt = setTimeout(() => el.classList.remove('show'), 4000);
}
function hideNotif() {
    clearTimeout(_nt);
    document.getElementById('notif').classList.remove('show');
}

document.addEventListener('click', closeAll);

updateSize(sel.image.ratio, sel.image.res);
renderOpts();
syncToolboxParseState();
syncToolboxFormatState();
</script>
