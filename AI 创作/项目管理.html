<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>项目管理 - 量化投放系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                   'Helvetica Neue', Arial, 'Noto Sans', 'PingFang SC',
                   'Microsoft YaHei', sans-serif;
      font-size: 14px;
      line-height: 1.5714;
      color: rgba(0,0,0,0.88);
      background-color: #f5f7fa;
      padding: 20px;
    }

    :root {
      --primary:        #1677ff;
      --primary-hover:  #4096ff;
      --primary-active: #0958d9;
      --primary-bg:     #e6f4ff;
      --primary-border: #91caff;
      --text-primary:   rgba(0,0,0,0.88);
      --text-secondary: rgba(0,0,0,0.45);
      --text-label:     rgba(0,0,0,0.65);
      --border:         #d9d9d9;
      --border-light:   #f0f0f0;
      --bg-card:        #ffffff;
      --bg-layout:      #f5f7fa;
      --success:        #52c41a;
      --danger:         #ff4d4f;
    }

    /* ── 整体布局 ───────────────────────────────────────────── */
    .page-layout { display: flex; gap: 16px; align-items: flex-start; }

    /* ── 左侧面板 ───────────────────────────────────────────── */
    .left-panel {
      width: 260px;
      flex-shrink: 0;
      background: var(--bg-card);
      border-radius: 8px;
      border: 1px solid var(--border-light);
      overflow: hidden;
    }

    .left-panel-header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--border-light);
    }

    .left-panel-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 10px;
    }

    .search-box { position: relative; }

    .search-icon {
      position: absolute;
      left: 9px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      height: 32px;
      padding: 4px 11px 4px 30px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text-primary);
      background: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(22,119,255,0.1);
    }

    .search-input::placeholder { color: var(--text-secondary); }

    .tree-list { padding: 4px 0; }

    /* ── 品类行 ─────────────────────────────────────────────── */
    .cat-row {
      display: flex;
      align-items: center;
      padding: 8px 12px 8px 10px;
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
      user-select: none;
    }

    .cat-row:hover { background: #fafafa; }

    .cat-row .chevron {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      color: var(--text-secondary);
      transition: transform 0.2s;
      margin-right: 6px;
    }

    .cat-row.expanded .chevron { transform: rotate(90deg); }

    .cat-row .cat-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .cat-row .cat-badge {
      font-size: 11px;
      color: var(--text-secondary);
      background: var(--bg-layout);
      padding: 1px 6px;
      border-radius: 8px;
      flex-shrink: 0;
      line-height: 18px;
      margin-left: 6px;
    }

    .cat-row .detail-btn {
      font-size: 12px;
      color: var(--primary);
      padding: 2px 8px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.15s, background 0.15s;
      flex-shrink: 0;
      margin-left: 6px;
      white-space: nowrap;
    }

    .cat-row:hover .detail-btn { opacity: 1; }
    .cat-row .detail-btn:hover { background: var(--primary-bg); }

    /* 品类选中态（查看详情时） */
    .cat-row.active {
      background: var(--primary-bg);
    }

    .cat-row.active .cat-name { color: var(--primary); }
    .cat-row.active .cat-badge { background: var(--primary-border); color: var(--primary); }
    .cat-row.active .detail-btn { opacity: 1; }

    /* ── 产品子列表 ─────────────────────────────────────────── */
    .prod-children {
      display: none;
      position: relative;
    }

    .prod-children.expanded { display: block; }

    /* 树形竖线 */
    .prod-children::before {
      content: '';
      position: absolute;
      left: 17px;
      top: 0;
      bottom: 8px;
      width: 1px;
      background: var(--border-light);
    }

    .prod-row {
      display: flex;
      align-items: center;
      padding: 7px 12px 7px 36px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.15s, border-color 0.15s;
      position: relative;
    }

    .prod-row:hover { background: #fafafa; }

    .prod-row.active {
      background: var(--primary-bg);
      border-left-color: var(--primary);
    }

    .prod-row.active .prod-name { color: var(--primary); font-weight: 500; }

    .prod-info { min-width: 0; flex: 1; }

    .prod-name {
      font-size: 14px;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .prod-meta {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 1px;
    }

    .list-empty {
      padding: 32px 16px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 13px;
    }

    /* ── 右侧面板 ───────────────────────────────────────────── */
    .right-panel { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 16px; }

    .detail-card {
      background: var(--bg-card);
      border-radius: 8px;
      border: 1px solid var(--border-light);
    }

    .card-header {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border-light);
      font-size: 15px;
      font-weight: 500;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-header-hint { font-size: 12px; font-weight: 400; color: var(--text-secondary); }
    .card-body { padding: 24px; }

    .card-footer {
      padding: 12px 24px;
      border-top: 1px solid var(--border-light);
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px 24px;
    }

    .info-item { display: flex; flex-direction: column; gap: 4px; }
    .info-label { font-size: 12px; color: var(--text-secondary); }
    .info-value { font-size: 14px; font-weight: 500; color: var(--text-primary); font-variant-numeric: tabular-nums; }

    .id-tag {
      display: inline-block;
      padding: 1px 8px;
      background: var(--primary-bg);
      border: 1px solid var(--primary-border);
      border-radius: 4px;
      color: var(--primary);
      font-size: 13px;
      font-family: monospace;
    }

    .field-group { margin-bottom: 16px; }
    .field-group:last-of-type { margin-bottom: 0; }
    .field-label { font-size: 14px; color: var(--text-label); margin-bottom: 6px; }

    .field-textarea {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      line-height: 1.5714;
      color: var(--text-primary);
      background: #fff;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      display: block;
    }

    .field-textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(22,119,255,0.1);
    }

    .field-textarea::placeholder { color: var(--text-secondary); }

    .char-count { font-size: 12px; color: var(--text-secondary); text-align: right; margin-top: 4px; }

    .btn {
      height: 32px;
      padding: 0 16px;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      border: 1px solid transparent;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
      line-height: 1;
    }

    .btn-default { background: #fff; border-color: var(--border); color: var(--text-primary); }
    .btn-default:hover { border-color: var(--primary); color: var(--primary); }
    .btn-primary { background: var(--primary); border-color: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
    .btn-primary:active { background: var(--primary-active); border-color: var(--primary-active); }

    .save-feedback {
      display: none;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--success);
    }

    .save-feedback.show { display: inline-flex; }

    .placeholder-card {
      background: var(--bg-card);
      border-radius: 8px;
      border: 1px solid var(--border-light);
      padding: 80px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: var(--text-secondary);
    }

    .placeholder-card svg { color: #d9d9d9; }
    .placeholder-title { font-size: 14px; color: rgba(0,0,0,0.45); }
    .placeholder-sub { font-size: 12px; color: rgba(0,0,0,0.25); }

    /* ── 产品物料 ───────────────────────────────────────────── */
    .material-section + .material-section {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--border-light);
    }

    .material-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .material-title-bar { width: 3px; height: 14px; background: var(--primary); border-radius: 2px; flex-shrink: 0; }
    .material-hint { margin-top: 8px; font-size: 12px; color: var(--text-secondary); }

    .upload-grid { display: flex; flex-wrap: wrap; gap: 8px; }

    .upload-btn {
      width: 104px;
      height: 104px;
      border: 1px dashed var(--border);
      border-radius: 8px;
      background: var(--bg-layout);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      color: var(--text-secondary);
      font-size: 12px;
    }

    .upload-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-bg); }

    .thumb-card {
      width: 104px;
      height: 104px;
      border-radius: 8px;
      border: 1px solid var(--border-light);
      overflow: hidden;
      position: relative;
      background: #fafafa;
    }

    .thumb-card img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .thumb-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .thumb-card:hover .thumb-overlay { opacity: 1; }
    .thumb-action { color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .thumb-action:hover svg { stroke: #ccc; }

    .video-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }

    .video-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: var(--bg-layout);
      border: 1px solid var(--border-light);
      border-radius: 6px;
    }

    .video-item-name { flex: 1; font-size: 13px; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .video-item-size { font-size: 12px; color: var(--text-secondary); flex-shrink: 0; }
    .video-item-del { font-size: 12px; color: var(--danger); cursor: pointer; flex-shrink: 0; }
    .video-item-del:hover { color: #ff7875; }

    .upload-file-btn {
      height: 32px;
      padding: 0 16px;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text-primary);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }

    .upload-file-btn:hover { border-color: var(--primary); color: var(--primary); }

    .preview-mask {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }

    .preview-mask.show { display: flex; }
    .preview-mask img { max-width: 90vw; max-height: 90vh; border-radius: 4px; }

    .preview-close {
      position: absolute;
      top: 24px;
      right: 32px;
      color: #fff;
      cursor: pointer;
      font-size: 28px;
      line-height: 1;
      opacity: 0.8;
    }

    .preview-close:hover { opacity: 1; }

    /* ── 视频预览遮罩 ───────────────────────────────────────────── */
    #videoPreviewMask video {
      max-width: 90vw;
      max-height: 85vh;
      border-radius: 4px;
      outline: none;
    }

    .video-item-preview {
      font-size: 12px;
      color: var(--primary);
      cursor: pointer;
      flex-shrink: 0;
    }

    .video-item-preview:hover { color: var(--primary-hover); }
  </style>
</head>
<body>

<div class="page-layout">

  <!-- ══ 左侧：树形列表 ════════════════════════════════════════ -->
  <div class="left-panel">
    <div class="left-panel-header">
      <div class="left-panel-title">项目管理</div>
      <div class="search-box">
        <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input class="search-input" id="searchInput"
               placeholder="搜索品类或产品"
               oninput="onSearch(this.value)">
      </div>
    </div>
    <div class="tree-list" id="treeList"></div>
  </div>

  <!-- ══ 右侧：详情区 ══════════════════════════════════════════ -->
  <div class="right-panel" id="rightPanel">
    <div class="placeholder-card">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
      </svg>
      <div class="placeholder-title">请从左侧选择品类或产品</div>
      <div class="placeholder-sub">点击品类展开产品列表，点击「详情」编辑品类信息</div>
    </div>
  </div>

</div>

<!-- 图片预览遮罩 -->
<div class="preview-mask" id="previewMask" onclick="closePreview(event)">
  <span class="preview-close" onclick="hidePreview()">&times;</span>
  <img id="previewImg" src="" alt="preview">
</div>

<!-- 视频预览遮罩 -->
<div class="preview-mask" id="videoPreviewMask" onclick="closeVideoPreview(event)">
  <span class="preview-close" onclick="hideVideoPreview()">&times;</span>
  <video id="previewVideo" controls></video>
</div>

<!-- 隐藏 file input -->
<input type="file" id="iconInput"  accept="image/*"              style="display:none">
<input type="file" id="shotInput"  accept="image/*"  multiple    style="display:none">
<input type="file" id="videoInput" accept="video/*"  multiple    style="display:none">

<script>
// ── 数据 ────────────────────────────────────────────────────────
const CATEGORIES = [
  {
    id: 'CAT001', name: '短视频工具',
    portrait: '以 18-35 岁年轻用户为主，娱乐消遣需求强，日均使用时长高，对新功能和激励玩法敏感，通过社交裂变和内容推荐获取。',
    description: '短视频拍摄、编辑、分享类 App，核心竞争力在于推荐算法和创作工具，变现模式以广告和电商为主。',
  },
  {
    id: 'CAT002', name: '视频剪辑',
    portrait: '内容创作者和自媒体从业者，年龄 20-40 岁，追求专业剪辑能力和高效工作流，愿意为高级功能付费。',
    description: '视频后期制作工具，提供剪辑、特效、字幕、音频处理等能力，桌面端和移动端双线发展。',
  },
  {
    id: 'CAT003', name: '企业协作',
    portrait: '企业用户和团队管理者，注重效率和安全性，采购决策链长，需要与现有 IT 系统集成，付费意愿由企业预算决定。',
    description: '集成即时通讯、文档协作、视频会议、项目管理等功能的一站式办公平台。',
  },
  {
    id: 'CAT004', name: '阅读工具',
    portrait: '小说和资讯阅读爱好者，年龄跨度大（15-50 岁），碎片化时间使用为主，价格敏感但可被内容质量和阅读体验打动。',
    description: '提供小说、漫画、资讯等内容的阅读平台，核心竞争力在于内容版权和个性化推荐。',
  },
];

const PRODUCTS = [
  { id: 'P001', name: '抖音极速版', catId: 'CAT001',
    desc: '抖音极速版是面向三四线城市用户设计的短视频 App，通过简洁的界面和流量激励模式吸引用户长期留存。',
    marketing: '看视频赚钱，每日最高领红包 10 元',
    extra: '支持离线缓存，低网络环境友好，安装包体积仅 40MB' },
  { id: 'P005', name: 'TikTok', catId: 'CAT001',
    desc: 'TikTok 是抖音的海外版本，面向全球用户提供短视频创作和浏览服务，支持多语言界面。',
    marketing: 'Make Every Second Count',
    extra: '已覆盖 150+ 国家和地区，MAU 超 10 亿' },
  { id: 'P002', name: '剪映专业版', catId: 'CAT002',
    desc: '剪映专业版为创作者提供专业的视频剪辑能力，包含 AI 特效、智能字幕、音频分离等核心功能。',
    marketing: 'AI 智能剪辑，一键生成大片',
    extra: '原生适配 M 系列芯片，剪辑速度提升 300%' },
  { id: 'P003', name: '飞书', catId: 'CAT003',
    desc: '飞书是字节跳动旗下的企业协作平台，集成即时通讯、文档协作、视频会议和项目管理等功能。',
    marketing: '让每个人都能享受高效愉悦的工作',
    extra: '与字节跳动内部工具链深度打通，支持超级 Tab' },
  { id: 'P004', name: '番茄小说', catId: 'CAT004',
    desc: '番茄小说提供海量免费小说内容，通过广告变现的商业模式实现完全免费阅读体验。',
    marketing: '海量正版小说，全部免费看',
    extra: '每日签到领书币，兑换精品付费书籍' },
];

// 展开状态、选中状态、物料状态
const expandedCats = new Set();
let activeType = null;  // 'cat' | 'prod'
let activeId = null;

const materialState = {};
PRODUCTS.forEach(p => { materialState[p.id] = { icon: null, shots: [], videos: [] }; });

function getProductsByCat(catId) { return PRODUCTS.filter(p => p.catId === catId); }

// ── 工具函数 ────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── 渲染树形列表 ────────────────────────────────────────────────
function renderTree(keyword) {
  const el = document.getElementById('treeList');
  const kw = (keyword || '').trim().toLowerCase();
  let html = '';
  let hasMatch = false;

  CATEGORIES.forEach(cat => {
    const prods = getProductsByCat(cat.id);
    const catMatch = !kw || cat.name.toLowerCase().includes(kw);
    const matchedProds = kw ? prods.filter(p => p.name.toLowerCase().includes(kw) || p.id.toLowerCase().includes(kw)) : prods;

    // 搜索模式：品类或其下产品匹配时才显示
    if (kw && !catMatch && matchedProds.length === 0) return;

    hasMatch = true;
    const displayProds = kw ? matchedProds : prods;
    // 搜索时自动展开有匹配产品的品类
    const isExpanded = kw ? (matchedProds.length > 0 || catMatch) : expandedCats.has(cat.id);
    const isActive = activeType === 'cat' && activeId === cat.id;

    html += `<div class="cat-row ${isExpanded ? 'expanded' : ''} ${isActive ? 'active' : ''}"
                  onclick="toggleCat('${cat.id}')" data-cat="${cat.id}">
      <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
      <span class="cat-name">${esc(cat.name)}</span>
      <span class="cat-badge">${prods.length}</span>
      <span class="detail-btn" onclick="event.stopPropagation(); showCatDetail('${cat.id}')">详情</span>
    </div>`;

    html += `<div class="prod-children ${isExpanded ? 'expanded' : ''}" data-cat-children="${cat.id}">`;
    displayProds.forEach(p => {
      const isProdActive = activeType === 'prod' && activeId === p.id;
      html += `<div class="prod-row ${isProdActive ? 'active' : ''}"
                    onclick="showProdDetail('${p.id}')" data-prod="${p.id}">
        <div class="prod-info">
          <div class="prod-name">${esc(p.name)}</div>
          <div class="prod-meta">${esc(p.id)} · ${esc(cat.name)}</div>
        </div>
      </div>`;
    });
    html += '</div>';
  });

  if (!hasMatch) {
    html = '<div class="list-empty">未找到匹配结果</div>';
  }

  el.innerHTML = html;
}

// ── 展开/收起品类 ───────────────────────────────────────────────
function toggleCat(catId) {
  if (expandedCats.has(catId)) {
    expandedCats.delete(catId);
  } else {
    expandedCats.add(catId);
  }
  renderTree();
}

// ── 搜索 ────────────────────────────────────────────────────────
function onSearch(val) { renderTree(val); }

// ── 显示品类详情 ────────────────────────────────────────────────
function showCatDetail(catId) {
  const cat = CATEGORIES.find(c => c.id === catId);
  if (!cat) return;
  activeType = 'cat';
  activeId = catId;
  renderTree(document.getElementById('searchInput').value);

  const panel = document.getElementById('rightPanel');
  const prods = getProductsByCat(catId);
  panel.innerHTML = `
    <div class="detail-card">
      <div class="card-header">品类信息<span class="card-header-hint">以下字段不可修改</span></div>
      <div class="card-body">
        <div class="info-grid">
          <div class="info-item"><div class="info-label">品类 ID</div><div class="info-value"><span class="id-tag">${esc(cat.id)}</span></div></div>
          <div class="info-item"><div class="info-label">品类名称</div><div class="info-value">${esc(cat.name)}</div></div>
          <div class="info-item"><div class="info-label">关联产品数</div><div class="info-value">${prods.length} 个</div></div>
        </div>
      </div>
    </div>
    <div class="detail-card">
      <div class="card-header">编辑信息</div>
      <div class="card-body">
        <div class="field-group">
          <div class="field-label">用户画像</div>
          <textarea class="field-textarea" id="catPortrait" rows="4"
                    placeholder="请输入该品类的目标用户画像..."
                    oninput="syncCount('catPortrait','catPortraitCount',500)">${esc(cat.portrait)}</textarea>
          <div class="char-count"><span id="catPortraitCount">${cat.portrait.length}</span> / 500</div>
        </div>
        <div class="field-group">
          <div class="field-label">品类描述</div>
          <textarea class="field-textarea" id="catDesc" rows="3"
                    placeholder="请输入品类描述..."
                    oninput="syncCount('catDesc','catDescCount',300)">${esc(cat.description)}</textarea>
          <div class="char-count"><span id="catDescCount">${cat.description.length}</span> / 300</div>
        </div>
      </div>
      <div class="card-footer">
        <span class="save-feedback" id="saveFeedback">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>已保存
        </span>
        <button class="btn btn-default" onclick="resetCat('${cat.id}')">重置</button>
        <button class="btn btn-primary" onclick="saveCat('${cat.id}')">保存</button>
      </div>
    </div>
  `;
}

function syncCount(inputId, countId, max) {
  const el = document.getElementById(inputId);
  const ct = document.getElementById(countId);
  if (!el || !ct) return;
  ct.textContent = el.value.length;
  ct.style.color = el.value.length > max * 0.9 ? 'var(--danger)' : 'var(--text-secondary)';
}

function resetCat(catId) {
  const cat = CATEGORIES.find(c => c.id === catId);
  if (!cat) return;
  document.getElementById('catPortrait').value = cat.portrait;
  document.getElementById('catDesc').value = cat.description;
  syncCount('catPortrait', 'catPortraitCount', 500);
  syncCount('catDesc', 'catDescCount', 300);
}

function saveCat(catId) {
  const cat = CATEGORIES.find(c => c.id === catId);
  if (!cat) return;
  cat.portrait = document.getElementById('catPortrait').value;
  cat.description = document.getElementById('catDesc').value;
  const fb = document.getElementById('saveFeedback');
  fb.classList.add('show');
  setTimeout(() => fb.classList.remove('show'), 2500);
}

// ── 显示产品详情 ────────────────────────────────────────────────
function showProdDetail(prodId) {
  const p = PRODUCTS.find(x => x.id === prodId);
  if (!p) return;
  const cat = CATEGORIES.find(c => c.id === p.catId);
  activeType = 'prod';
  activeId = prodId;
  renderTree(document.getElementById('searchInput').value);

  const panel = document.getElementById('rightPanel');
  panel.innerHTML = `
    <div class="detail-card">
      <div class="card-header">基础信息</div>
      <div class="card-body">
        <div class="info-grid">
          <div class="info-item"><div class="info-label">产品名称</div><div class="info-value">${esc(p.name)}</div></div>
          <div class="info-item"><div class="info-label">产品 ID</div><div class="info-value"><span class="id-tag">${esc(p.id)}</span></div></div>
          <div class="info-item"><div class="info-label">所属品类</div><div class="info-value">${esc(cat ? cat.name : p.catId)}</div></div>
        </div>
      </div>
    </div>
    <div class="detail-card">
      <div class="card-header">编辑信息</div>
      <div class="card-body">
        <div class="field-group">
          <div class="field-label">功能描述</div>
          <textarea class="field-textarea" id="fieldDesc" rows="3" placeholder="请输入产品功能描述">${esc(p.desc)}</textarea>
        </div>
        <div class="field-group">
          <div class="field-label">核心营销点</div>
          <textarea class="field-textarea" id="fieldMarketing" rows="3" placeholder="请输入核心营销点">${esc(p.marketing)}</textarea>
        </div>
        <div class="field-group">
          <div class="field-label">补充描述</div>
          <textarea class="field-textarea" id="fieldExtra" rows="2" placeholder="请输入补充描述（可选）">${esc(p.extra)}</textarea>
        </div>
      </div>
      <div class="card-footer">
        <span class="save-feedback" id="saveFeedback">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>已保存
        </span>
        <button class="btn btn-primary" onclick="saveProd('${p.id}')">保存</button>
      </div>
    </div>
    <div class="detail-card">
      <div class="card-header">产品物料</div>
      <div class="card-body">
        <div class="material-section">
          <div class="material-title"><div class="material-title-bar"></div>图标</div>
          <div class="upload-grid" id="iconGrid"></div>
          <div class="material-hint">仅上传 1 张 · PNG / JPG · 建议尺寸 1024×1024</div>
        </div>
        <div class="material-section">
          <div class="material-title"><div class="material-title-bar"></div>截屏</div>
          <div class="upload-grid" id="shotGrid"></div>
          <div class="material-hint">支持多张 · PNG / JPG</div>
        </div>
        <div class="material-section">
          <div class="material-title"><div class="material-title-bar"></div>录屏</div>
          <div class="video-list" id="videoList"></div>
          <button class="upload-file-btn" onclick="triggerVideoUpload()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/>
              <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
            </svg>
            上传录屏
          </button>
          <div class="material-hint">支持多个 · MP4 / MOV / AVI</div>
        </div>
      </div>
    </div>
  `;
  renderIconGrid(p.id);
  renderShotGrid(p.id);
  renderVideoList(p.id);
  bindFileInputs(p.id);
}

function saveProd(id) {
  const p = PRODUCTS.find(x => x.id === id);
  if (!p) return;
  p.desc      = document.getElementById('fieldDesc').value;
  p.marketing = document.getElementById('fieldMarketing').value;
  p.extra     = document.getElementById('fieldExtra').value;
  const fb = document.getElementById('saveFeedback');
  fb.classList.add('show');
  setTimeout(() => fb.classList.remove('show'), 2500);
}

// ── 物料管理 ────────────────────────────────────────────────────
function renderIconGrid(id) {
  const grid = document.getElementById('iconGrid');
  if (!grid) return;
  const st = materialState[id];
  grid.innerHTML = '';
  if (st.icon) {
    grid.appendChild(makeThumb(st.icon, () => { st.icon = null; renderIconGrid(id); }));
  } else {
    grid.appendChild(makeUploadBtn(() => { const inp = document.getElementById('iconInput'); inp.dataset.target = id; inp.value = ''; inp.click(); }));
  }
}

function renderShotGrid(id) {
  const grid = document.getElementById('shotGrid');
  if (!grid) return;
  const st = materialState[id];
  grid.innerHTML = '';
  st.shots.forEach((url, idx) => {
    grid.appendChild(makeThumb(url, () => { st.shots.splice(idx, 1); renderShotGrid(id); }));
  });
  grid.appendChild(makeUploadBtn(() => { const inp = document.getElementById('shotInput'); inp.dataset.target = id; inp.value = ''; inp.click(); }));
}

function renderVideoList(id) {
  const el = document.getElementById('videoList');
  if (!el) return;
  const st = materialState[id];
  el.innerHTML = st.videos.map((v, idx) => `
    <div class="video-item">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
           stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
      </svg>
      <span class="video-item-name" title="${esc(v.name)}">${esc(v.name)}</span>
      <span class="video-item-size">${formatSize(v.size)}</span>
      ${v.blobUrl ? `<span class="video-item-preview" onclick="showVideoPreview('${v.blobUrl}')">预览</span>` : ''}
      <span class="video-item-del" onclick="removeVideo('${id}',${idx})">删除</span>
    </div>
  `).join('');
}

function triggerVideoUpload() {
  const inp = document.getElementById('videoInput');
  inp.dataset.target = activeId;
  inp.value = '';
  inp.click();
}

function removeVideo(id, idx) {
  const v = materialState[id].videos[idx];
  if (v && v.blobUrl) URL.revokeObjectURL(v.blobUrl);
  materialState[id].videos.splice(idx, 1);
  renderVideoList(id);
}

function bindFileInputs(id) {
  document.getElementById('iconInput').onchange = function() {
    const f = this.files[0]; if (!f) return;
    readUrl(f, url => { materialState[id].icon = url; renderIconGrid(id); });
  };
  document.getElementById('shotInput').onchange = function() {
    Array.from(this.files).forEach(f => { readUrl(f, url => { materialState[id].shots.push(url); renderShotGrid(id); }); });
  };
  document.getElementById('videoInput').onchange = function() {
    Array.from(this.files).forEach(f => {
      const blobUrl = URL.createObjectURL(f);
      materialState[id].videos.push({ name: f.name, size: f.size, blobUrl });
      renderVideoList(id);
    });
  };
}

function makeUploadBtn(onClick) {
  const d = document.createElement('div');
  d.className = 'upload-btn';
  d.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span>上传</span>';
  d.onclick = onClick;
  return d;
}

function makeThumb(src, onRemove) {
  const d = document.createElement('div');
  d.className = 'thumb-card';
  d.innerHTML = `<img src="${src}" alt=""><div class="thumb-overlay"><span class="thumb-action" title="预览" onclick="showPreview('${src}')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></span><span class="thumb-action" title="删除"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg></span></div>`;
  d.querySelectorAll('.thumb-action')[1].onclick = onRemove;
  return d;
}

function readUrl(file, cb) { const r = new FileReader(); r.onload = e => cb(e.target.result); r.readAsDataURL(file); }
function formatSize(b) { return !b ? '' : b > 1048576 ? (b/1048576).toFixed(1)+' MB' : Math.round(b/1024)+' KB'; }

// ── 图片预览 ────────────────────────────────────────────────────
function showPreview(src) { document.getElementById('previewImg').src = src; document.getElementById('previewMask').classList.add('show'); }
function hidePreview() { document.getElementById('previewMask').classList.remove('show'); }
function closePreview(e) { if (e.target === document.getElementById('previewMask')) hidePreview(); }

// ── 视频预览 ────────────────────────────────────────────────────
function showVideoPreview(src) {
  const video = document.getElementById('previewVideo');
  video.src = src;
  video.currentTime = 0;
  document.getElementById('videoPreviewMask').classList.add('show');
  video.play().catch(() => {});
}
function hideVideoPreview() {
  const video = document.getElementById('previewVideo');
  video.pause();
  video.src = '';
  document.getElementById('videoPreviewMask').classList.remove('show');
}
function closeVideoPreview(e) { if (e.target === document.getElementById('videoPreviewMask')) hideVideoPreview(); }

// ── 初始化 ──────────────────────────────────────────────────────
renderTree();
</script>
</body>
</html>
